<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Core General — Timeline</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --border:#e1e4e8; --text:#1f2328; --muted:#6b7280;
    --accent:#2563eb; --today:#ef4444;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
  #toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;position:relative;z-index:60;}
  #toolbar h1{font-size:15px;font-weight:600;margin:0 12px 0 0;white-space:nowrap;}
  button, select{font:inherit;font-size:13px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text);}
  button:hover{background:#f0f2f5;}
  #status{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap;}
  #status.saving{color:#b45309;}
  #status.error{color:#dc2626;}

  #legend{display:none;gap:10px;align-items:center;font-size:11.5px;color:var(--muted);padding:6px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;}
  #legend.shown{display:flex;}
  #legend.shown.collapsed{display:none;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;flex-shrink:0;}

  #signin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px;text-align:center;padding:20px;}
  #signin-screen p{color:var(--muted);font-size:14px;max-width:420px;}

  /* --- Assignee filter dropdown --- */
  #assignee-filter, #activity-filter{position:relative;}
  #assignee-panel, #activity-panel{display:none;position:absolute;top:36px;left:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);width:240px;max-height:360px;overflow-y:auto;z-index:70;padding:8px;}
  #assignee-panel.open, #activity-panel.open{display:block;}
  #assignee-panel input[type=text], #activity-panel input[type=text]{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:6px;}
  .assignee-actions{display:flex;gap:6px;margin-bottom:6px;}
  .assignee-actions button{flex:1;padding:4px;font-size:11.5px;}
  .assignee-row{display:flex;align-items:center;gap:6px;padding:4px 4px;font-size:12.5px;border-radius:4px;}
  .assignee-row:hover{background:#f0f2f5;}
  .assignee-row label{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .assignee-row .dot{margin-right:0;}

  /* --- Single scrollable canvas: both axes on #timeline-wrap so the
     horizontal scrollbar is always visible within the viewport. --- */
  #timeline-wrap{display:none;overflow:scroll;height:calc(100vh - 90px);position:relative;cursor:grab;}
  #timeline-wrap.panning{cursor:grabbing;}
  #timeline-wrap::-webkit-scrollbar{height:15px;width:15px;}
  #timeline-wrap::-webkit-scrollbar-track{background:#e5e7eb;}
  #timeline-wrap::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:8px;border:3px solid #e5e7eb;}
  #timeline-wrap::-webkit-scrollbar-thumb:hover{background:#64748b;}
  #timeline-wrap{scrollbar-width:auto;scrollbar-color:#94a3b8 #e5e7eb;}
  #grid{position:relative;}

  .ext-label{position:absolute;height:26px;display:flex;align-items:center;font-size:11.5px;color:var(--text);white-space:nowrap;cursor:grab;user-select:none;pointer-events:auto;}
  .ext-label b{margin-right:5px;}
  .ext-label .ext-date{color:var(--muted);margin-left:5px;font-size:10.5px;}

  #month-header{position:sticky;top:0;z-index:20;display:flex;background:var(--panel);border-bottom:1px solid var(--border);height:34px;}
  #day-header{position:sticky;top:34px;z-index:20;display:flex;background:var(--panel);border-bottom:1px solid var(--border);height:22px;}
  .corner{position:sticky;left:0;z-index:30;width:170px;height:34px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);}
  .corner.corner-day{height:22px;}
  .month-cell{position:absolute;top:0;height:34px;border-right:1px solid var(--border);font-size:12px;font-weight:600;padding:8px 0 0 6px;color:var(--text);white-space:nowrap;overflow:hidden;}
  .day-cell{position:absolute;top:0;height:22px;border-right:1px solid #eee;font-size:10px;color:var(--muted);text-align:center;line-height:22px;}
  .day-cell.weekend{background:#f7f7f8;}

  #body-row{position:relative;}
  .lane-bg{position:absolute;left:0;right:0;border-bottom:1px solid var(--border);}
  .lane-label-wrap{position:absolute;left:0;width:100%;}
  .lane-label{position:sticky;left:0;z-index:12;width:170px;padding:8px 10px;font-size:12px;font-weight:600;background:var(--panel);border-right:1px solid var(--border);height:100%;display:flex;align-items:center;}
  .lane-label small{display:block;font-weight:400;color:var(--muted);font-size:10.5px;margin-top:2px;}

  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);z-index:5;}

  .bar{position:absolute;z-index:1;height:26px;border-radius:5px;font-size:11.5px;color:var(--text);display:flex;align-items:center;padding:0 8px;white-space:nowrap;overflow:visible;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.15);user-select:none;}
  .bar-text{overflow:visible;font-weight:400;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 4px #fff,0 0 4px #fff;}
  .bar:active{cursor:grabbing;}
  .bar.dragging{opacity:.85;box-shadow:0 3px 8px rgba(0,0,0,.3);z-index:40;}
  .bar .handle{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;}
  .bar .handle.left{left:0;}
  .bar .handle.right{right:0;}

  #tooltip{position:fixed;background:#111827;color:#fff;font-size:12px;padding:8px 10px;border-radius:6px;pointer-events:none;z-index:100;max-width:320px;line-height:1.5;display:none;box-shadow:0 4px 12px rgba(0,0,0,.3);}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Core General — Timeline</h1>
  <button id="btn-signin">Sign in with Google</button>
  <button id="btn-reload" style="display:none;">Reload from Sheet</button>
  <button id="btn-today" style="display:none;">Today</button>
  <button id="btn-legend-toggle" style="display:none;">Hide legend</button>
  <div id="assignee-filter" style="display:none;">
    <button id="btn-assignee">Assignees ▾</button>
    <div id="assignee-panel">
      <input type="text" id="assignee-search" placeholder="Search assignee…">
      <div class="assignee-actions">
        <button id="assignee-all">All</button>
        <button id="assignee-none">None</button>
      </div>
      <div id="assignee-list"></div>
    </div>
  </div>
  <div id="activity-filter" style="display:none;">
    <button id="btn-activity">Activities ▾</button>
    <div id="activity-panel">
      <input type="text" id="activity-search" placeholder="Search activity…">
      <div class="assignee-actions">
        <button id="activity-all">All</button>
        <button id="activity-none">None</button>
      </div>
      <div id="activity-list"></div>
    </div>
  </div>
  <select id="zoom" style="display:none;">
    <option value="4">Zoom: Quarter</option>
    <option value="10">Zoom: Month</option>
    <option value="24" selected>Zoom: Week</option>
    <option value="42">Zoom: Day</option>
  </select>
  <span id="status"></span>
</div>

<div id="legend"></div>

<div id="signin-screen">
  <p>Sign in with your Google account to load the <b>Core General Raw Data</b> sheet as a drag-and-drop timeline. Dragging a bar updates the Start/End date cells directly in the sheet.</p>
</div>

<div id="timeline-wrap">
  <div id="grid"></div>
</div>

<div id="tooltip"></div>

<script>
/* ============================================================
   CONFIG — fill these in before deploying
   ============================================================ */
const CONFIG = {
  CLIENT_ID: "1085131580879-4ne61amqc10srbcrhqf6i2buddjiojg8.apps.googleusercontent.com",
  SPREADSHEET_ID: "1mM_6BOF2_XsmXJudqXMic95eAmxAShVBfbILxm7F86I",
  SHEET_NAME: "Core general Raw Data",
  // Columns (0-indexed) within the fetched range A:L
  COL: { ASSIGNEE:0, DEPT:1, JIRA:2, FEATURE:3, TASKS:4, ACTIVITY:5, START:6, END:7, EST:8, FORECAST:9, STATUS:10, NAMEINPLAN:11 },
  SCOPES: "https://www.googleapis.com/auth/spreadsheets",
  TOKEN_STORAGE_KEY: "sheet_timeline_token_v1",
};

const LABEL_W = 170;
const ACTIVITY_PALETTE = ["#2563eb","#16a34a","#dc2626","#d97706","#7c3aed","#0891b2","#db2777","#65a30d","#ea580c","#4f46e5","#0d9488","#be123c","#9333ea","#059669","#0284c7","#a16207"];

/* ============================================================
   State
   ============================================================ */
let accessToken = null;
let tokenClient = null;
let tokenExpiryMs = 0;
let tasks = [];        // parsed task rows
let lanes = [];         // { name, idxs: [taskIndices...], subRowCount }
let minDate, maxDate;
let pxPerDay = 24; // overridden from saved uiState.zoom once the DOM is ready, see boot below
const ROW_H = 34;
const DAY_MS = 86400000;
let activityColors = new Map();
let selectedAssignees = null; // null = all selected; else Set of names
let selectedActivities = null; // null = all selected; else Set of activity names
const ORDER_STORAGE_KEY = "sheet_timeline_order_v1";
let manualOrder = {}; // assignee name -> [rowNum, ...] priority order, drag-to-reorder, persisted locally
try { manualOrder = JSON.parse(localStorage.getItem(ORDER_STORAGE_KEY) || "{}"); } catch (e) { manualOrder = {}; }

/* ============================================================
   UI state (zoom, legend visibility, assignee selection) —
   persisted across reloads so the view doesn't reset every time.
   ============================================================ */
const UI_STATE_KEY = "sheet_timeline_ui_state_v1";
let uiState = { zoom: 24, legendCollapsed: false, assignees: null, activities: null }; // null = not yet customized (default all)
try {
  const saved = JSON.parse(localStorage.getItem(UI_STATE_KEY) || "null");
  if (saved) uiState = { ...uiState, ...saved };
} catch (e) { /* ignore malformed state */ }

function saveUiState() {
  localStorage.setItem(UI_STATE_KEY, JSON.stringify(uiState));
}

/* ============================================================
   Auth — cache the access token in localStorage and try a silent
   (no-popup) re-auth on load / before it expires, so signing in
   once is enough for most days as long as the browser keeps its
   Google session alive. A pure client-side page cannot get a
   refresh token, so this is "silent re-auth", not a real session.
   ============================================================ */
function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: (resp) => {
      if (resp.error) { setStatus("Sign-in failed: " + resp.error, true); return; }
      accessToken = resp.access_token;
      tokenExpiryMs = Date.now() + (parseInt(resp.expires_in || "3600", 10) * 1000);
      localStorage.setItem(CONFIG.TOKEN_STORAGE_KEY, JSON.stringify({ token: accessToken, expiry: tokenExpiryMs }));
      scheduleSilentRefresh();
      onSignedIn();
    },
  });

  // Try to reuse a cached token first.
  try {
    const cached = JSON.parse(localStorage.getItem(CONFIG.TOKEN_STORAGE_KEY) || "null");
    if (cached && cached.token && cached.expiry > Date.now() + 60000) {
      accessToken = cached.token;
      tokenExpiryMs = cached.expiry;
      scheduleSilentRefresh();
      onSignedIn();
      return;
    }
  } catch (e) { /* ignore malformed cache */ }

  // No valid cached token — try one silent attempt (works if the browser
  // still has an active Google session and consent was already granted).
  tokenClient.requestAccessToken({ prompt: "" });
}

function scheduleSilentRefresh() {
  const msUntilRefresh = Math.max(30000, tokenExpiryMs - Date.now() - 120000);
  setTimeout(() => {
    if (tokenClient) tokenClient.requestAccessToken({ prompt: "" });
  }, msUntilRefresh);
}

document.getElementById("btn-signin").addEventListener("click", () => {
  if (!tokenClient) { setStatus("Google auth not loaded yet — retry in a second.", true); return; }
  tokenClient.requestAccessToken({ prompt: "consent" });
});

document.getElementById("btn-reload").addEventListener("click", loadData);

document.getElementById("btn-today").addEventListener("click", jumpToToday);

function jumpToToday() {
  if (!minDate) return;
  const wrap = document.getElementById("timeline-wrap");
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayX = LABEL_W + dayOffset(today) * pxPerDay;
  wrap.scrollTo({ left: Math.max(0, todayX - wrap.clientWidth / 2), behavior: "smooth" });
}

document.getElementById("zoom").addEventListener("change", (e) => {
  pxPerDay = parseInt(e.target.value, 10);
  uiState.zoom = pxPerDay;
  saveUiState();
  render();
});

function onSignedIn() {
  document.getElementById("signin-screen").style.display = "none";
  document.getElementById("timeline-wrap").style.display = "block";
  document.getElementById("btn-signin").textContent = "Re-authenticate";
  document.getElementById("btn-reload").style.display = "inline-block";
  document.getElementById("btn-today").style.display = "inline-block";
  document.getElementById("assignee-filter").style.display = "inline-block";
  document.getElementById("activity-filter").style.display = "inline-block";
  document.getElementById("zoom").style.display = "inline-block";
  document.getElementById("btn-legend-toggle").style.display = "inline-block";
  document.getElementById("legend").classList.add("shown");

  // Restore saved zoom + legend visibility before the first render.
  pxPerDay = uiState.zoom || 24;
  document.getElementById("zoom").value = String(pxPerDay);
  if (uiState.legendCollapsed) {
    document.getElementById("legend").classList.add("collapsed");
    document.getElementById("btn-legend-toggle").textContent = "Show legend";
  }

  loadData();
}

document.getElementById("btn-legend-toggle").addEventListener("click", () => {
  const legend = document.getElementById("legend");
  const collapsed = legend.classList.toggle("collapsed");
  document.getElementById("btn-legend-toggle").textContent = collapsed ? "Show legend" : "Hide legend";
  uiState.legendCollapsed = collapsed;
  saveUiState();
});

/* ============================================================
   Pan the view by dragging empty space (not a bar / label / control)
   ============================================================ */
(function setupPan() {
  const wrap = document.getElementById("timeline-wrap");
  let panning = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;
  wrap.addEventListener("mousedown", (e) => {
    if (e.target.closest(".bar") || e.target.closest(".ext-label") || e.target.closest(".lane-label")) return;
    panning = true;
    startX = e.clientX; startY = e.clientY;
    startLeft = wrap.scrollLeft; startTop = wrap.scrollTop;
    wrap.classList.add("panning");
    e.preventDefault();
  });
  document.addEventListener("mousemove", (e) => {
    if (!panning) return;
    wrap.scrollLeft = startLeft - (e.clientX - startX);
    wrap.scrollTop = startTop - (e.clientY - startY);
  });
  document.addEventListener("mouseup", () => {
    if (!panning) return;
    panning = false;
    wrap.classList.remove("panning");
  });
})();

/* ============================================================
   Data loading
   ============================================================ */
function setStatus(msg, isError, saving) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = isError ? "error" : (saving ? "saving" : "");
}

async function sheetsFetch(path, opts = {}) {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json", ...(opts.headers || {}) },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`Sheets API ${res.status}: ${body}`);
  }
  return res.json();
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  let m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (!m) return null;
  const month = parseInt(m[1], 10), day = parseInt(m[2], 10), year = parseInt(m[3], 10);
  const d = new Date(year, month - 1, day);
  return isNaN(d.getTime()) ? null : d;
}

function fmtDate(d) {
  return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
}

function activityKey(activity) {
  return (activity || "Uncategorized").trim() || "Uncategorized";
}

function colorForActivity(activity) {
  const key = activityKey(activity);
  if (!activityColors.has(key)) {
    activityColors.set(key, ACTIVITY_PALETTE[activityColors.size % ACTIVITY_PALETTE.length]);
  }
  return activityColors.get(key);
}

async function loadData() {
  setStatus("Loading sheet…");
  try {
    const range = `'${CONFIG.SHEET_NAME}'!A2:L3000`;
    const data = await sheetsFetch(`/values/${encodeURIComponent(range)}?majorDimension=ROWS`);
    const rows = data.values || [];
    const C = CONFIG.COL;
    const MIN_SANE_YEAR = 2015; // dates before this are blank/formula cells rendered as the Sheets epoch (1899/1900)
    tasks = [];
    activityColors = new Map();
    let skippedSentinel = 0;
    rows.forEach((row, i) => {
      const assignee = (row[C.ASSIGNEE] || "").trim();
      const start = parseDate(row[C.START]);
      const end = parseDate(row[C.END]);
      if (!assignee || !start || !end) return; // skip blank/header/incomplete rows
      if (start.getFullYear() < MIN_SANE_YEAR || end.getFullYear() < MIN_SANE_YEAR) { skippedSentinel++; return; }
      const activity = (row[C.ACTIVITY] || "").trim();
      tasks.push({
        rowNum: i + 2, // actual sheet row (1-based, +1 for header)
        assignee,
        department: row[C.DEPT] || "",
        jira: row[C.JIRA] || "",
        feature: row[C.FEATURE] || "",
        taskName: row[C.TASKS] || "",
        activity,
        start, end,
        est: row[C.EST] || "",
        status: row[C.STATUS] || "",
        label: (row[C.FEATURE] || row[C.TASKS] || row[C.ACTIVITY] || "Task"),
        color: colorForActivity(activity),
      });
    });

    if (selectedAssignees === null) {
      // First load this session: restore the saved selection if we have one,
      // otherwise default to everyone selected.
      selectedAssignees = uiState.assignees ? new Set(uiState.assignees) : new Set(tasks.map(t => t.assignee));
    } else {
      // keep previous selection, but add any brand-new assignees as selected
      const allNames = new Set(tasks.map(t => t.assignee));
      allNames.forEach(n => { if (!selectedAssignees.has(n) && !everSeenAssignees.has(n)) selectedAssignees.add(n); });
    }
    everSeenAssignees = new Set(tasks.map(t => t.assignee));

    if (selectedActivities === null) {
      selectedActivities = uiState.activities ? new Set(uiState.activities) : new Set(tasks.map(t => activityKey(t.activity)));
    } else {
      const allActivities = new Set(tasks.map(t => activityKey(t.activity)));
      allActivities.forEach(a => { if (!selectedActivities.has(a) && !everSeenActivities.has(a)) selectedActivities.add(a); });
    }
    everSeenActivities = new Set(tasks.map(t => activityKey(t.activity)));

    buildAssigneePanel();
    buildActivityPanel();
    buildLegend();
    buildLanes();
    render();
    setStatus(`Loaded ${tasks.length} tasks${skippedSentinel ? ` · ${skippedSentinel} skipped (blank date cells)` : ""} · ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus("Load failed: " + err.message, true);
  }
}
let everSeenAssignees = new Set();
let everSeenActivities = new Set();

/* ============================================================
   Legend (dynamic, by Activity)
   ============================================================ */
function buildLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  const names = Array.from(activityColors.keys()).sort();
  names.forEach((name) => {
    const span = document.createElement("span");
    span.style.display = "flex";
    span.style.alignItems = "center";
    span.innerHTML = `<span class="dot" style="background:${activityColors.get(name)};"></span>${escapeHtml(name)}`;
    legend.appendChild(span);
  });
}

/* ============================================================
   Assignee filter panel
   ============================================================ */
function buildAssigneePanel() {
  const list = document.getElementById("assignee-list");
  list.innerHTML = "";
  const counts = new Map();
  tasks.forEach(t => counts.set(t.assignee, (counts.get(t.assignee) || 0) + 1));
  const names = Array.from(counts.keys()).sort();
  names.forEach((name) => {
    const row = document.createElement("div");
    row.className = "assignee-row";
    row.dataset.name = name.toLowerCase();
    const id = "asg_" + name.replace(/[^a-z0-9]/gi, "_");
    row.innerHTML = `<input type="checkbox" id="${id}" ${selectedAssignees.has(name) ? "checked" : ""}>
      <label for="${id}">${escapeHtml(name)} <span style="color:var(--muted);">(${counts.get(name)})</span></label>`;
    row.querySelector("input").addEventListener("change", (e) => {
      if (e.target.checked) selectedAssignees.add(name); else selectedAssignees.delete(name);
      persistAssigneeSelection();
      buildLanes(); render();
    });
    list.appendChild(row);
  });
}

document.getElementById("btn-assignee").addEventListener("click", () => {
  document.getElementById("assignee-panel").classList.toggle("open");
});
document.addEventListener("click", (e) => {
  const filter = document.getElementById("assignee-filter");
  if (!filter.contains(e.target)) document.getElementById("assignee-panel").classList.remove("open");
});
document.getElementById("assignee-search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll("#assignee-list .assignee-row").forEach(row => {
    row.style.display = row.dataset.name.includes(q) ? "flex" : "none";
  });
});
document.getElementById("assignee-all").addEventListener("click", () => {
  selectedAssignees = new Set(tasks.map(t => t.assignee));
  persistAssigneeSelection();
  buildAssigneePanel(); buildLanes(); render();
});
document.getElementById("assignee-none").addEventListener("click", () => {
  selectedAssignees = new Set();
  persistAssigneeSelection();
  buildAssigneePanel(); buildLanes(); render();
});

function persistAssigneeSelection() {
  uiState.assignees = Array.from(selectedAssignees);
  saveUiState();
}

/* ============================================================
   Activity filter panel
   ============================================================ */
function buildActivityPanel() {
  const list = document.getElementById("activity-list");
  list.innerHTML = "";
  const counts = new Map();
  tasks.forEach(t => { const k = activityKey(t.activity); counts.set(k, (counts.get(k) || 0) + 1); });
  const names = Array.from(counts.keys()).sort();
  names.forEach((name) => {
    const row = document.createElement("div");
    row.className = "assignee-row";
    row.dataset.name = name.toLowerCase();
    const id = "act_" + name.replace(/[^a-z0-9]/gi, "_");
    row.innerHTML = `<input type="checkbox" id="${id}" ${selectedActivities.has(name) ? "checked" : ""}>
      <label for="${id}"><span class="dot" style="background:${colorForActivity(name)};"></span>${escapeHtml(name)} <span style="color:var(--muted);">(${counts.get(name)})</span></label>`;
    row.querySelector("input").addEventListener("change", (e) => {
      if (e.target.checked) selectedActivities.add(name); else selectedActivities.delete(name);
      persistActivitySelection();
      buildLanes(); render();
    });
    list.appendChild(row);
  });
}

document.getElementById("btn-activity").addEventListener("click", () => {
  document.getElementById("activity-panel").classList.toggle("open");
});
document.addEventListener("click", (e) => {
  const filter = document.getElementById("activity-filter");
  if (!filter.contains(e.target)) document.getElementById("activity-panel").classList.remove("open");
});
document.getElementById("activity-search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll("#activity-list .assignee-row").forEach(row => {
    row.style.display = row.dataset.name.includes(q) ? "flex" : "none";
  });
});
document.getElementById("activity-all").addEventListener("click", () => {
  selectedActivities = new Set(tasks.map(t => activityKey(t.activity)));
  persistActivitySelection();
  buildActivityPanel(); buildLanes(); render();
});
document.getElementById("activity-none").addEventListener("click", () => {
  selectedActivities = new Set();
  persistActivitySelection();
  buildActivityPanel(); buildLanes(); render();
});

function persistActivitySelection() {
  uiState.activities = Array.from(selectedActivities);
  saveUiState();
}

/* ============================================================
   Lanes — one row per task, in priority order (earliest Start first)
   ============================================================ */
function buildLanes() {
  const byAssignee = new Map();
  tasks.forEach((t, idx) => {
    if (!selectedAssignees.has(t.assignee)) return;
    if (!selectedActivities.has(activityKey(t.activity))) return;
    if (!byAssignee.has(t.assignee)) byAssignee.set(t.assignee, []);
    byAssignee.get(t.assignee).push(idx);
  });

  lanes = [];
  for (const [name, idxs] of byAssignee.entries()) {
    const savedOrder = manualOrder[name];
    if (savedOrder && savedOrder.length) {
      const pos = new Map(savedOrder.map((rowNum, i) => [rowNum, i]));
      idxs.sort((a, b) => {
        const oa = pos.has(tasks[a].rowNum) ? pos.get(tasks[a].rowNum) : Infinity;
        const ob = pos.has(tasks[b].rowNum) ? pos.get(tasks[b].rowNum) : Infinity;
        return oa !== ob ? oa - ob : tasks[a].start - tasks[b].start;
      });
    } else {
      idxs.sort((a, b) => tasks[a].start - tasks[b].start);
    }
    idxs.forEach((idx, r) => { tasks[idx].subRow = r; });
    lanes.push({ name, idxs, subRowCount: idxs.length });
  }
  lanes.sort((a, b) => a.name.localeCompare(b.name));

  if (!tasks.length) return;
  const visibleTasks = lanes.flatMap(l => l.idxs).map(i => tasks[i]);
  if (!visibleTasks.length) { minDate = new Date(); maxDate = new Date(); maxDate.setDate(maxDate.getDate() + 30); return; }
  minDate = new Date(Math.min(...visibleTasks.map(t => t.start.getTime())));
  maxDate = new Date(Math.max(...visibleTasks.map(t => t.end.getTime())));
  minDate.setDate(minDate.getDate() - 7);
  maxDate.setDate(maxDate.getDate() + 14);
}

function dayOffset(d) {
  return Math.round((d - minDate) / DAY_MS);
}

/* ============================================================
   Render
   ============================================================ */
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!lanes.length) { grid.style.width = "100%"; grid.style.height = "200px"; grid.textContent = "No tasks match the current assignee filter."; return; }

  const totalDays = dayOffset(maxDate) + 1;
  const gridWidth = totalDays * pxPerDay;
  const fullWidth = LABEL_W + gridWidth;

  grid.style.width = fullWidth + "px";

  // Month header
  const monthHeader = document.createElement("div");
  monthHeader.id = "month-header";
  monthHeader.style.width = fullWidth + "px";
  const monthCorner = document.createElement("div");
  monthCorner.className = "corner";
  monthHeader.appendChild(monthCorner);
  let cursor = new Date(minDate);
  cursor.setDate(1);
  while (cursor <= maxDate) {
    const next = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    const segStart = cursor < minDate ? minDate : cursor;
    const segEnd = next < maxDate ? next : new Date(maxDate.getTime() + DAY_MS);
    const left = LABEL_W + dayOffset(segStart) * pxPerDay;
    const width = Math.max(1, (dayOffset(segEnd) - dayOffset(segStart)) * pxPerDay);
    const cell = document.createElement("div");
    cell.className = "month-cell";
    cell.style.left = left + "px";
    cell.style.width = width + "px";
    cell.textContent = cursor.toLocaleDateString(undefined, { month: "short", year: "numeric" });
    monthHeader.appendChild(cell);
    cursor = next;
  }
  grid.appendChild(monthHeader);

  // Day header
  const dayHeader = document.createElement("div");
  dayHeader.id = "day-header";
  dayHeader.style.width = fullWidth + "px";
  const dayCorner = document.createElement("div");
  dayCorner.className = "corner corner-day";
  dayHeader.appendChild(dayCorner);
  for (let d = 0; d < totalDays; d++) {
    const date = new Date(minDate.getTime() + d * DAY_MS);
    const cell = document.createElement("div");
    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
    cell.className = "day-cell" + (isWeekend ? " weekend" : "");
    cell.style.left = (LABEL_W + d * pxPerDay) + "px";
    cell.style.width = pxPerDay + "px";
    if (pxPerDay >= 20) cell.textContent = date.getDate();
    dayHeader.appendChild(cell);
  }
  grid.appendChild(dayHeader);

  // Body
  const body = document.createElement("div");
  body.id = "body-row";
  body.style.width = fullWidth + "px";

  let y = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayX = LABEL_W + dayOffset(today) * pxPerDay;

  lanes.forEach((lane) => {
    const laneHeight = lane.subRowCount * ROW_H;

    const bg = document.createElement("div");
    bg.className = "lane-bg";
    bg.style.top = y + "px";
    bg.style.height = laneHeight + "px";
    body.appendChild(bg);

    const labelWrap = document.createElement("div");
    labelWrap.className = "lane-label-wrap";
    labelWrap.style.top = y + "px";
    labelWrap.style.height = laneHeight + "px";
    labelWrap.innerHTML = `<div class="lane-label">${escapeHtml(lane.name)}<small>${lane.idxs.length} task${lane.idxs.length !== 1 ? "s" : ""}</small></div>`;
    body.appendChild(labelWrap);

    lane.idxs.forEach((idx) => {
      const t = tasks[idx];
      const left = LABEL_W + dayOffset(t.start) * pxPerDay;
      const width = Math.max(pxPerDay * 0.6, (dayOffset(t.end) - dayOffset(t.start) + 1) * pxPerDay - 2);
      const top = y + t.subRow * ROW_H + 4;
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.background = t.color;
      bar.style.left = left + "px";
      bar.style.top = top + "px";
      bar.style.width = width + "px";
      bar.dataset.idx = idx;

      // Full text is always Feature/Improvement/Support + Activity — never
      // truncated. It always sits anchored at the bar's real start date;
      // if it's longer than the bar, it simply spills past the colored
      // area onto the plain background (readable via the white text halo)
      // rather than being clipped or bumped to a floating label.
      const fullText = t.activity ? `${t.label} • ${t.activity}` : t.label;
      bar.title = fullText;
      bar.innerHTML = `<span class="bar-text">${escapeHtml(fullText)}</span>
        <div class="handle left"></div><div class="handle right"></div>`;

      attachDrag(bar, t, null, lane, idx, top);
      attachTooltip(bar, t);
      body.appendChild(bar);
    });

    y += laneHeight;
  });

  const totalHeight = y;

  if (todayX >= LABEL_W) {
    const line = document.createElement("div");
    line.className = "today-line";
    line.style.left = todayX + "px";
    line.style.height = totalHeight + "px";
    body.appendChild(line);
  }

  body.style.height = totalHeight + "px";
  grid.appendChild(body);
  grid.style.height = (56 + totalHeight) + "px";
}

const _measureCanvas = document.createElement("canvas");
const _measureCtx = _measureCanvas.getContext("2d");
_measureCtx.font = "11.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif";
function measureTextWidth(text) {
  return _measureCtx.measureText(text).width;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ============================================================
   Tooltip
   ============================================================ */
function attachTooltip(bar, t) {
  const tip = document.getElementById("tooltip");
  bar.addEventListener("mouseenter", (e) => {
    tip.innerHTML = `<b>${escapeHtml(t.feature || t.taskName || t.activity)}</b><br>
      ${t.jira ? "JIRA: " + escapeHtml(t.jira) + "<br>" : ""}
      ${t.activity ? "Activity: " + escapeHtml(t.activity) + "<br>" : ""}
      Assignee: ${escapeHtml(t.assignee)}<br>
      ${fmtDate(t.start)} → ${fmtDate(t.end)}<br>
      ${t.status ? "Status: " + escapeHtml(t.status) : ""}`;
    tip.style.display = "block";
  });
  bar.addEventListener("mousemove", (e) => {
    tip.style.left = (e.clientX + 14) + "px";
    tip.style.top = (e.clientY + 14) + "px";
  });
  bar.addEventListener("mouseleave", () => { tip.style.display = "none"; });
}

/* ============================================================
   Drag & resize
   ============================================================ */
function attachDrag(bar, t, extLabel, lane, idx, origTop) {
  let mode = null; // 'move' | 'left' | 'right'
  let startX = 0, startY = 0;
  let origStart, origEnd;
  let deltaRows = 0;

  const onMouseDown = (e) => {
    if (e.target.classList.contains("handle")) {
      mode = e.target.classList.contains("left") ? "left" : "right";
    } else {
      mode = "move";
    }
    startX = e.clientX;
    startY = e.clientY;
    origStart = new Date(t.start);
    origEnd = new Date(t.end);
    deltaRows = 0;
    bar.classList.add("dragging");
    if (mode === "move") bar.style.zIndex = 40;
    document.getElementById("tooltip").style.display = "none";
    e.preventDefault();
    e.stopPropagation(); // don't also trigger canvas panning
  };
  bar.addEventListener("mousedown", onMouseDown);
  if (extLabel) extLabel.addEventListener("mousedown", onMouseDown); // label-only drag = move

  document.addEventListener("mousemove", (e) => {
    if (!mode) return;
    const deltaPx = e.clientX - startX;
    const deltaDays = Math.round(deltaPx / pxPerDay);
    let newStart = new Date(origStart), newEnd = new Date(origEnd);
    if (mode === "move") {
      newStart.setDate(newStart.getDate() + deltaDays);
      newEnd.setDate(newEnd.getDate() + deltaDays);
    } else if (mode === "left") {
      newStart.setDate(newStart.getDate() + deltaDays);
      if (newStart > origEnd) newStart = new Date(origEnd);
    } else if (mode === "right") {
      newEnd.setDate(newEnd.getDate() + deltaDays);
      if (newEnd < origStart) newEnd = new Date(origStart);
    }
    t.start = newStart; t.end = newEnd;
    const left = LABEL_W + dayOffset(t.start) * pxPerDay;
    const width = Math.max(pxPerDay * 0.6, (dayOffset(t.end) - dayOffset(t.start) + 1) * pxPerDay - 2);
    bar.style.left = left + "px";
    bar.style.width = width + "px";
    if (extLabel) extLabel.style.left = (left + width + 5) + "px";

    // Vertical drag (whole-bar move only) = reorder priority within the lane.
    if (mode === "move" && lane) {
      const deltaY = e.clientY - startY;
      deltaRows = Math.max(-(t.subRow), Math.min(lane.subRowCount - 1 - t.subRow, Math.round(deltaY / ROW_H)));
      const newTop = origTop + deltaRows * ROW_H;
      bar.style.top = newTop + "px";
      if (extLabel) extLabel.style.top = newTop + "px";
    }
  });

  document.addEventListener("mouseup", async () => {
    if (!mode) return;
    bar.classList.remove("dragging");
    bar.style.zIndex = "";
    const wasMove = mode === "move";
    const changed = t.start.getTime() !== origStart.getTime() || t.end.getTime() !== origEnd.getTime();
    mode = null;

    if (wasMove && lane && deltaRows !== 0) {
      const srcPos = lane.idxs.indexOf(idx);
      const destPos = Math.max(0, Math.min(lane.idxs.length - 1, srcPos + deltaRows));
      if (destPos !== srcPos) {
        lane.idxs.splice(srcPos, 1);
        lane.idxs.splice(destPos, 0, idx);
        lane.idxs.forEach((ix, r) => { tasks[ix].subRow = r; });
        manualOrder[lane.name] = lane.idxs.map(ix => tasks[ix].rowNum);
        localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(manualOrder));
      }
      render();
      if (changed) await saveDates(t, bar);
      return;
    }

    if (!changed) return;
    await saveDates(t, bar);
  });
}

async function saveDates(t, bar) {
  setStatus(`Saving row ${t.rowNum}…`, false, true);
  try {
    const range = `'${CONFIG.SHEET_NAME}'!G${t.rowNum}:H${t.rowNum}`;
    await sheetsFetch(`/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, {
      method: "PUT",
      body: JSON.stringify({ range, majorDimension: "ROWS", values: [[fmtDate(t.start), fmtDate(t.end)]] }),
    });
    setStatus(`Saved row ${t.rowNum}: ${fmtDate(t.start)} → ${fmtDate(t.end)} · ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus("Save failed — reload to resync: " + err.message, true);
  }
}

/* ============================================================
   Boot
   ============================================================ */
window.addEventListener("load", () => {
  const check = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2) {
      clearInterval(check);
      initAuth();
    }
  }, 100);
});
