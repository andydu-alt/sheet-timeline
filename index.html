<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Core General — Timeline</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --border:#e1e4e8; --text:#1f2328; --muted:#6b7280;
    --accent:#2563eb; --today:#ef4444;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;overflow:hidden;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
  #toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;position:relative;z-index:60;flex-shrink:0;}
  #toolbar h1{font-size:15px;font-weight:600;margin:0 12px 0 0;white-space:nowrap;}
  button, select{font:inherit;font-size:13px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text);}
  button.icon-btn{position:relative;padding:6px 12px;font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
  button.icon-btn:disabled{opacity:.4;cursor:default;}
  button.icon-btn i{position:absolute;top:-5px;right:-5px;font-style:normal;background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:8px;padding:0 4px;min-width:14px;text-align:center;line-height:15px;}
  button.icon-btn i:empty{display:none;}
  button:hover{background:#f0f2f5;}
  #status{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap;}
  #status.saving{color:#b45309;}
  #status.error{color:#dc2626;}

  #legend{display:none;gap:10px;align-items:center;font-size:11.5px;color:var(--muted);padding:6px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;max-height:35vh;overflow-y:auto;}
  #legend.shown{display:flex;}
  #legend.shown.collapsed{display:none;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;flex-shrink:0;}

  #signin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;text-align:center;padding:20px;}
  #signin-screen p{color:var(--muted);font-size:14px;max-width:420px;}

  /* --- Assignee filter dropdown --- */
  #assignee-filter, #activity-filter{position:relative;}
  /* position:fixed + JS-computed top/left (positionFilterPanel) so the
     panel is always placed relative to the viewport and the button's real
     location — immune to being clipped or dragged off by an ancestor's
     own scroll (e.g. the toolbar's horizontal scroll on mobile). */
  #assignee-panel, #activity-panel{display:none;position:fixed;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);width:240px;max-height:360px;overflow-y:auto;z-index:70;padding:8px;}
  #assignee-panel.open, #activity-panel.open{display:block;}
  #assignee-panel input[type=text], #activity-panel input[type=text]{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:6px;}
  .assignee-actions{display:flex;gap:6px;margin-bottom:6px;}
  .assignee-actions button{flex:1;padding:4px;font-size:11.5px;}
  .assignee-row{display:flex;align-items:center;gap:6px;padding:4px 4px;font-size:12.5px;border-radius:4px;}
  .assignee-row:hover{background:#f0f2f5;}
  .assignee-row label{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .assignee-row .dot{margin-right:0;}

  /* --- Single scrollable canvas: both axes on #timeline-wrap so the
     horizontal scrollbar is always visible within the viewport. --- */
  #timeline-wrap{display:none;overflow:scroll;flex:1;min-height:0;position:relative;cursor:grab;touch-action:none;}
  #timeline-wrap.panning{cursor:grabbing;}
  #timeline-wrap::-webkit-scrollbar{height:15px;width:15px;}
  #timeline-wrap::-webkit-scrollbar-track{background:#e5e7eb;}
  #timeline-wrap::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:8px;border:3px solid #e5e7eb;}
  #timeline-wrap::-webkit-scrollbar-thumb:hover{background:#64748b;}
  #timeline-wrap{scrollbar-width:auto;scrollbar-color:#94a3b8 #e5e7eb;}
  #grid{position:relative;}

  .ext-label{position:absolute;height:26px;display:flex;align-items:center;font-size:11.5px;color:var(--text);white-space:nowrap;cursor:grab;user-select:none;pointer-events:auto;}
  .ext-label b{margin-right:5px;}
  .ext-label .ext-date{color:var(--muted);margin-left:5px;font-size:10.5px;}

  #month-header{position:sticky;top:0;z-index:20;display:flex;background:var(--panel);border-bottom:1px solid var(--border);height:34px;}
  #day-header{position:sticky;top:34px;z-index:20;display:flex;background:var(--panel);border-bottom:1px solid var(--border);height:22px;}
  .corner{position:sticky;left:0;z-index:30;width:118px;height:34px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);}
  .corner.corner-day{height:22px;}
  .month-cell{position:absolute;top:0;height:34px;border-right:1px solid var(--border);font-size:12px;font-weight:600;padding:8px 0 0 6px;color:var(--text);white-space:nowrap;overflow:hidden;}
  .day-cell{position:absolute;top:0;height:22px;border-right:1px solid #eee;font-size:10px;color:var(--muted);text-align:center;line-height:22px;}
  .day-cell.week-start{border-left:2px solid #d1d5db;}
  .week-line{position:absolute;top:0;bottom:0;width:1px;background:#e5e7eb;z-index:0;}

  #body-row{position:relative;}
  .lane-bg{position:absolute;left:0;right:0;border-bottom:1px solid var(--border);}
  .lane-label-wrap{position:absolute;left:0;width:100%;}
  .lane-label{position:sticky;left:0;z-index:12;width:118px;padding:8px 8px;font-size:11.5px;font-weight:600;background:var(--panel);border-right:1px solid var(--border);height:100%;display:flex;align-items:center;overflow:hidden;line-height:1.25;}
  .lane-label small{display:block;font-weight:400;color:var(--muted);font-size:10px;margin-top:2px;}

  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);z-index:5;}

  #current-assignee-banner{display:none;}

  .bar{position:absolute;z-index:1;height:26px;border-radius:5px;font-size:11.5px;color:var(--text);display:flex;align-items:center;padding:0 8px;white-space:nowrap;overflow:visible;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.15),inset 0 0 0 1px rgba(0,0,0,.12);user-select:none;touch-action:none;}
  .bar-text{overflow:visible;font-weight:400;color:#000;}
  .bar:active{cursor:grabbing;}
  .bar.dragging{opacity:.85;box-shadow:0 3px 8px rgba(0,0,0,.3);z-index:40;}
  .bar .handle{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;touch-action:none;}
  .bar .handle.left{left:0;}
  .bar .handle.right{right:0;}

  #tooltip{position:fixed;background:#111827;color:#fff;font-size:12px;padding:8px 10px;border-radius:6px;pointer-events:none;z-index:100;max-width:320px;line-height:1.5;display:none;box-shadow:0 4px 12px rgba(0,0,0,.3);}

  #task-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;}
  #task-modal-backdrop.open{display:flex;}
  #task-modal{background:#fff;border-radius:10px;box-shadow:0 20px 50px rgba(0,0,0,.3);width:420px;max-width:92vw;padding:20px;}
  #task-modal h2{font-size:15px;margin:0 0 4px;}
  #task-modal .sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  #task-modal .row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--border);}
  #task-modal .row span:first-child{color:var(--muted);}
  #task-modal .field{margin-top:12px;}
  #task-modal .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  #task-modal .field input{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;}
  #task-modal .preview{margin-top:14px;padding:10px 12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;font-size:12.5px;}
  #task-modal .preview b{color:#0369a1;}
  #task-modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  #task-modal .warn{margin-top:10px;font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;padding:8px 10px;border-radius:6px;}

  /* --- Mobile view: bigger touch targets, roomier bars, vertical settings drawer --- */
  #toolbar-controls{display:contents;} /* desktop: transparent wrapper, children stay direct flex items of #toolbar */
  #btn-drawer-toggle{display:none;}
  #drawer-backdrop{display:none;}

  body.mobile-mode #toolbar{padding:8px 12px;gap:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  body.mobile-mode #toolbar h1{display:none;}
  body.mobile-mode #btn-drawer-toggle{display:inline-flex;min-height:40px;padding:8px 14px;font-size:14px;}
  body.mobile-mode #btn-today{min-height:40px;padding:8px 14px;font-size:14px;flex-shrink:0;}

  /* The settings drawer: a real vertical panel that slides in from the
     left, toggled independently of the timeline underneath it. */
  body.mobile-mode #toolbar-controls{
    display:flex;flex-direction:column;align-items:stretch;gap:8px;
    position:fixed;top:0;left:0;bottom:0;width:82vw;max-width:300px;
    background:var(--panel);padding:16px;padding-top:56px;overflow-y:auto;
    box-shadow:3px 0 20px rgba(0,0,0,.25);z-index:210;
    transform:translateX(-100%);transition:transform .25s ease;
  }
  body.mobile-mode #toolbar-controls.drawer-open{transform:translateX(0);}
  body.mobile-mode #toolbar-controls button,
  body.mobile-mode #toolbar-controls select{width:100%;text-align:left;min-height:44px;padding:10px 12px;font-size:14px;}
  body.mobile-mode #toolbar-controls #status{white-space:normal;font-size:12px;margin-top:4px;}
  body.mobile-mode #assignee-filter, body.mobile-mode #activity-filter{width:100%;}
  body.mobile-mode #assignee-filter button, body.mobile-mode #activity-filter button{width:100%;}

  body.mobile-mode #drawer-backdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;}
  /* #toolbar (position:relative + z-index) creates its own stacking context,
     so the drawer nested inside it only out-stacks the backdrop if #toolbar
     itself out-stacks it — bump #toolbar's z-index well above the backdrop's. */
  body.mobile-mode #toolbar{z-index:300;}

  body.mobile-mode .bar{height:30px;}
  body.mobile-mode .bar .handle{width:16px;} /* 8px is too small to grab reliably with a finger */
  body.mobile-mode .lane-label{font-size:11px;}
  /* Mobile: accordion, not a floating popover — expands in-place right
     below its button inside the drawer's own scroll flow. This sidesteps
     every position:fixed/transform/stacking-context edge case the
     floating version kept hitting on a touch device. */
  body.mobile-mode #assignee-panel, body.mobile-mode #activity-panel{
    position:static !important;width:100%;max-width:none;max-height:none;
    box-shadow:none;border:1px solid var(--border);margin-top:6px;
  }
  body.mobile-mode #task-modal{width:94vw;padding:16px;}

  /* Frozen left assignee column is replaced by a scroll-synced banner on
     mobile, reclaiming its width for the timeline itself. */
  body.mobile-mode .corner{width:0 !important;}
  body.mobile-mode .lane-label{display:none;}
  /* Now lives inline in the top bar next to Today, not inside the
     scrolling timeline — no sticky positioning or header offset needed. */
  body.mobile-mode #current-assignee-banner{
    display:inline-flex;align-items:center;height:32px;padding:0 10px;
    background:#111827;color:#fff;font-size:12.5px;font-weight:600;border-radius:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw;flex-shrink:1;
  }

  /* Custom scroll indicators — iOS Safari doesn't render styled (or even
     default) scrollbars reliably, so without these there's no visual cue
     for how far you've scrolled or how much further there is to go. */
  #mobile-hscroll, #mobile-vscroll{display:none;}
  body.mobile-mode #mobile-hscroll{
    display:block;position:fixed;left:0;right:0;bottom:0;height:5px;
    background:rgba(0,0,0,.06);z-index:230;pointer-events:none;
  }
  body.mobile-mode #mobile-hscroll-thumb{position:absolute;top:0;bottom:0;left:0;background:rgba(37,99,235,.55);border-radius:3px;}
  body.mobile-mode #mobile-vscroll{
    display:block;position:fixed;top:0;bottom:0;right:0;width:5px;
    background:rgba(0,0,0,.06);z-index:230;pointer-events:none;
  }
  body.mobile-mode #mobile-vscroll-thumb{position:absolute;left:0;right:0;top:0;background:rgba(37,99,235,.55);border-radius:3px;}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Core General — Timeline</h1>
  <button id="btn-drawer-toggle">☰ Settings</button>
  <button id="btn-today" style="display:none;">Today</button>
  <div id="current-assignee-banner"></div>
  <div id="toolbar-controls">
    <button id="btn-signin">Sign in with Google</button>
    <button id="btn-reload" style="display:none;">Reload from Sheet</button>
    <button id="btn-undo" class="icon-btn" style="display:none;" disabled title="Undo"><span>↶</span><i id="undo-count"></i></button>
    <button id="btn-redo" class="icon-btn" style="display:none;" disabled title="Redo"><span>↷</span><i id="redo-count"></i></button>
    <button id="btn-legend-toggle" style="display:none;">Hide legend</button>
    <button id="btn-apply-frd-spec" style="display:none;">Apply FRD/Spec Formulas</button>
    <button id="btn-align-waterfall" style="display:none;">Align Waterfall</button>
    <button id="btn-mobile-toggle">📱 Mobile view</button>
    <div id="assignee-filter" style="display:none;">
      <button id="btn-assignee">Assignees ▾</button>
      <div id="assignee-panel">
        <input type="text" id="assignee-search" placeholder="Search assignee…">
        <div class="assignee-actions">
          <button id="assignee-all">All</button>
          <button id="assignee-none">None</button>
        </div>
        <div id="assignee-list"></div>
      </div>
    </div>
    <div id="activity-filter" style="display:none;">
      <button id="btn-activity">Activities ▾</button>
      <div id="activity-panel">
        <input type="text" id="activity-search" placeholder="Search activity…">
        <div class="assignee-actions">
          <button id="activity-all">All</button>
          <button id="activity-none">None</button>
        </div>
        <div id="activity-list"></div>
      </div>
    </div>
    <select id="zoom" style="display:none;">
      <option value="4">Zoom: Quarter</option>
      <option value="10">Zoom: Month</option>
      <option value="24" selected>Zoom: Week</option>
      <option value="42">Zoom: Day</option>
    </select>
    <span id="status"></span>
  </div>
</div>
<div id="drawer-backdrop"></div>

<div id="legend"></div>

<div id="signin-screen">
  <p>Sign in with your Google account to load the <b>Core General Raw Data</b> sheet as a drag-and-drop timeline. Dragging a bar updates the Start/End date cells directly in the sheet.</p>
</div>

<div id="timeline-wrap">
  <div id="grid"></div>
</div>
<div id="mobile-hscroll"><div id="mobile-hscroll-thumb"></div></div>
<div id="mobile-vscroll"><div id="mobile-vscroll-thumb"></div></div>

<div id="tooltip"></div>

<div id="task-modal-backdrop">
  <div id="task-modal">
    <h2 id="tm-title">Task</h2>
    <div class="sub" id="tm-sub"></div>
    <div class="row"><span>Start</span><span id="tm-start">–</span></div>
    <div class="row"><span>End</span><span id="tm-end">–</span></div>
    <div class="row" id="tm-formula-row"><span>End formula</span><span id="tm-formula">–</span></div>
    <div class="field">
      <label for="tm-est">Estimate (man-days)</label>
      <input type="number" id="tm-est" step="0.1" min="0">
    </div>
    <div class="field">
      <label for="tm-workload">Workload (%)</label>
      <input type="number" id="tm-workload" step="1" min="1" max="100">
    </div>
    <div class="preview" id="tm-preview" style="display:none;"></div>
    <div class="warn" id="tm-warn" style="display:none;"></div>
    <div class="actions">
      <button id="tm-cancel">Close</button>
      <button id="tm-recalc">Recalculate</button>
      <button id="tm-apply" style="display:none;">Apply</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — fill these in before deploying
   ============================================================ */
const CONFIG = {
  CLIENT_ID: "1085131580879-4ne61amqc10srbcrhqf6i2buddjiojg8.apps.googleusercontent.com",
  SPREADSHEET_ID: "1mM_6BOF2_XsmXJudqXMic95eAmxAShVBfbILxm7F86I",
  SHEET_NAME: "Core general Raw Data",
  // Columns (0-indexed) within the fetched range A:L
  COL: { ASSIGNEE:0, DEPT:1, JIRA:2, FEATURE:3, TASKS:4, ACTIVITY:5, START:6, END:7, EST:8, FORECAST:9, STATUS:10, NAMEINPLAN:11 },
  SCOPES: "https://www.googleapis.com/auth/spreadsheets",
  TOKEN_STORAGE_KEY: "sheet_timeline_token_v1",
};

let LABEL_W = 118; // 0 in mobile mode — the frozen label column is replaced by a scroll-synced banner instead
let laneScrollRanges = []; // [{name, yStart}] in body-row-relative Y, rebuilt each render() — drives the mobile assignee banner
const ACTIVITY_PALETTE = ["#bfdbfe","#bbf7d0","#fecaca","#fde68a","#ddd6fe","#a5f3fc","#fbcfe8","#d9f99d","#fed7aa","#c7d2fe","#99f6e4","#fecdd3","#e9d5ff","#a7f3d0","#bae6fd","#fef08a"];

/* ============================================================
   State
   ============================================================ */
let accessToken = null;
let tokenClient = null;
let tokenExpiryMs = 0;
let tasks = [];        // parsed task rows
let lanes = [];         // { name, idxs: [taskIndices...], subRowCount }
let minDate, maxDate;
let workdayList = [];       // Date[] — every working day (no weekends/holidays) from minDate..maxDate, in order
let workdayIndexMap = new Map(); // dateKey -> index into workdayList, used to compress weekends out of the grid
let pxPerDay = 24; // overridden from saved uiState.zoom once the DOM is ready, see boot below
const ROW_H = 34;
const DAY_MS = 86400000;
let holidaySet = new Set(); // "YYYY-M-D" keys, Vietnam holidays from the Holidays tab

function dateKey(d) { return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }

function isWorkingDay(d) {
  const day = d.getDay();
  if (day === 0 || day === 6) return false;
  return !holidaySet.has(dateKey(d));
}

function snapForwardToWorkingDay(d) {
  const r = new Date(d);
  while (!isWorkingDay(r)) r.setDate(r.getDate() + 1);
  return r;
}

// Inclusive count of working days between two dates (e.g. Fri->Mon = 2).
function countWorkingDays(start, end) {
  let count = 0;
  const d = new Date(start);
  while (d <= end) {
    if (isWorkingDay(d)) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

// The date reached after `workDayCount` working days starting at `start`
// (start itself counts as day 1) — used to preserve a task's working-day
// duration when it's dragged across a weekend/holiday, e.g. a 2-workday
// task that spans Fri-Mon (4 calendar days) stays 2 workdays wherever it
// lands, even if the new position also straddles a weekend.
function addWorkingDaysInclusive(start, workDayCount) {
  const d = new Date(start);
  let count = isWorkingDay(d) ? 1 : 0;
  while (count < workDayCount) {
    d.setDate(d.getDate() + 1);
    if (isWorkingDay(d)) count++;
  }
  return d;
}

async function loadHolidays() {
  try {
    const data = await sheetsFetch(`/values/${encodeURIComponent("Holidays!B1:B300")}?majorDimension=ROWS`);
    const rows = data.values || [];
    holidaySet = new Set();
    rows.forEach((row) => {
      const d = parseDate(row[0]);
      if (d) holidaySet.add(dateKey(d));
    });
  } catch (err) {
    console.error("Holiday load failed (dragging will only respect weekends):", err);
  }
}
let activityColors = new Map();
let selectedAssignees = null; // null = all selected; else Set of names
let selectedActivities = null; // null = all selected; else Set of activity names
const ORDER_STORAGE_KEY = "sheet_timeline_order_v1";
let manualOrder = {}; // assignee name -> [rowNum, ...] priority order, drag-to-reorder, persisted locally
try { manualOrder = JSON.parse(localStorage.getItem(ORDER_STORAGE_KEY) || "{}"); } catch (e) { manualOrder = {}; }

/* ============================================================
   Undo / redo (10 steps) — covers drag date changes, resizes,
   row-reorders, and dependency-chain shifts. Restores in-memory
   state AND re-saves any changed dates back to the sheet.
   ============================================================ */
const MAX_HISTORY = 10;
let undoStack = [];
let redoStack = [];

function snapshotState() {
  return {
    dates: tasks.map(t => ({ rowNum: t.rowNum, start: t.start.getTime(), end: t.end.getTime() })),
    manualOrder: JSON.parse(JSON.stringify(manualOrder)),
  };
}

function commitUndoPoint(preSnapshot) {
  undoStack.push(preSnapshot);
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}

async function applySnapshot(snapshot) {
  const byRow = new Map(snapshot.dates.map(d => [d.rowNum, d]));
  const changedRows = []; // { t, origStart, origEnd }
  tasks.forEach((t) => {
    const d = byRow.get(t.rowNum);
    if (!d) return;
    if (t.start.getTime() !== d.start || t.end.getTime() !== d.end) {
      const origStart = new Date(t.start), origEnd = new Date(t.end);
      t.start = new Date(d.start);
      t.end = new Date(d.end);
      changedRows.push({ t, origStart, origEnd });
    }
  });
  manualOrder = snapshot.manualOrder;
  localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(manualOrder));
  buildLanes();
  render();
  for (const { t, origStart, origEnd } of changedRows) await saveChangedFields(t, origStart, origEnd);
}

async function undo() {
  if (!undoStack.length) return;
  const current = snapshotState();
  const prev = undoStack.pop();
  redoStack.push(current);
  if (redoStack.length > MAX_HISTORY) redoStack.shift();
  updateUndoRedoButtons();
  await applySnapshot(prev);
}

async function redo() {
  if (!redoStack.length) return;
  const current = snapshotState();
  const next = redoStack.pop();
  undoStack.push(current);
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  updateUndoRedoButtons();
  await applySnapshot(next);
}

function updateUndoRedoButtons() {
  const undoBtn = document.getElementById("btn-undo");
  const redoBtn = document.getElementById("btn-redo");
  if (!undoBtn) return;
  undoBtn.disabled = undoStack.length === 0;
  undoBtn.title = `Undo${undoStack.length ? ` (${undoStack.length})` : ""}`;
  document.getElementById("undo-count").textContent = undoStack.length || "";
  redoBtn.disabled = redoStack.length === 0;
  redoBtn.title = `Redo${redoStack.length ? ` (${redoStack.length})` : ""}`;
  document.getElementById("redo-count").textContent = redoStack.length || "";
}

/* ============================================================
   Auth — cache the access token in localStorage and try a silent
   (no-popup) re-auth on load / before it expires, so signing in
   once is enough for most days as long as the browser keeps its
   Google session alive. A pure client-side page cannot get a
   refresh token, so this is "silent re-auth", not a real session.
   ============================================================ */
function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: (resp) => {
      if (resp.error) { setStatus("Sign-in failed: " + resp.error, true); return; }
      accessToken = resp.access_token;
      tokenExpiryMs = Date.now() + (parseInt(resp.expires_in || "3600", 10) * 1000);
      localStorage.setItem(CONFIG.TOKEN_STORAGE_KEY, JSON.stringify({ token: accessToken, expiry: tokenExpiryMs }));
      scheduleSilentRefresh();
      onSignedIn();
    },
  });

  // Try to reuse a cached token first.
  try {
    const cached = JSON.parse(localStorage.getItem(CONFIG.TOKEN_STORAGE_KEY) || "null");
    if (cached && cached.token && cached.expiry > Date.now() + 60000) {
      accessToken = cached.token;
      tokenExpiryMs = cached.expiry;
      scheduleSilentRefresh();
      onSignedIn();
      return;
    }
  } catch (e) { /* ignore malformed cache */ }

  // No valid cached token — try one silent attempt (works if the browser
  // still has an active Google session and consent was already granted).
  tokenClient.requestAccessToken({ prompt: "" });
}

function scheduleSilentRefresh() {
  const msUntilRefresh = Math.max(30000, tokenExpiryMs - Date.now() - 120000);
  setTimeout(() => {
    if (tokenClient) tokenClient.requestAccessToken({ prompt: "" });
  }, msUntilRefresh);
}

function jumpToToday(instant) {
  if (!minDate) return;
  const wrap = document.getElementById("timeline-wrap");
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayX = LABEL_W + dayOffset(today) * pxPerDay;
  const targetLeft = Math.max(0, todayX - wrap.clientWidth / 2);

  // Also center vertically on whichever tasks are actually active today,
  // so Today doesn't just line up the date column — it lands you right on
  // the current work instead of leaving you to scroll through every lane.
  let y = 0;
  const activeYs = [];
  lanes.forEach((lane) => {
    const laneHeight = lane.subRowCount * ROW_H;
    lane.idxs.forEach((idx) => {
      const t = tasks[idx];
      if (t.start <= today && today <= t.end) activeYs.push(y + t.subRow * ROW_H + ROW_H / 2);
    });
    y += laneHeight;
  });

  let targetTop = wrap.scrollTop; // no active tasks today — leave vertical position alone
  if (activeYs.length) {
    const avgY = activeYs.reduce((a, b) => a + b, 0) / activeYs.length;
    targetTop = Math.max(0, avgY + 56 - wrap.clientHeight / 2); // +56 = month/day header height
  }

  wrap.scrollTo({ left: targetLeft, top: targetTop, behavior: instant ? "auto" : "smooth" });
}

   ============================================================ */
(function setupPan() {
  const wrap = document.getElementById("timeline-wrap");
  let panning = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;
  wrap.addEventListener("pointerdown", (e) => {
    if (e.target.closest(".bar") || e.target.closest(".ext-label") || e.target.closest(".lane-label")) return;
    panning = true;
    startX = e.clientX; startY = e.clientY;
    startLeft = wrap.scrollLeft; startTop = wrap.scrollTop;
    wrap.classList.add("panning");
    wrap.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  wrap.addEventListener("pointermove", (e) => {
    if (!panning) return;
    wrap.scrollLeft = startLeft - (e.clientX - startX);
    wrap.scrollTop = startTop - (e.clientY - startY);
  });
  wrap.addEventListener("pointerup", () => {
    if (!panning) return;
    panning = false;
    wrap.classList.remove("panning");
  });
  wrap.addEventListener("pointercancel", () => {
    panning = false;
    wrap.classList.remove("panning");
  });
})();

/* ============================================================
   Data loading
   ============================================================ */
function setStatus(msg, isError, saving) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = isError ? "error" : (saving ? "saving" : "");
}

async function sheetsFetch(path, opts = {}) {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json", ...(opts.headers || {}) },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`Sheets API ${res.status}: ${body}`);
  }
  return res.json();
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  let m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (!m) return null;
  const month = parseInt(m[1], 10), day = parseInt(m[2], 10), year = parseInt(m[3], 10);
  const d = new Date(year, month - 1, day);
  return isNaN(d.getTime()) ? null : d;
}

function fmtDate(d) {
  return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
}

// Mirrors Google Sheets' WORKDAY(start_date, num_days, [holidays]): moves
// num_days working days forward (or back, if negative) from start_date —
// start_date itself is NOT counted, and fractional num_days is truncated.
function excelWorkday(start, numDaysRaw) {
  const numDays = Math.trunc(numDaysRaw);
  const d = new Date(start);
  let remaining = Math.abs(numDays);
  const step = numDays >= 0 ? 1 : -1;
  while (remaining > 0) {
    d.setDate(d.getDate() + step);
    if (isWorkingDay(d)) remaining--;
  }
  return d;
}

// Parses the specific pattern used in this sheet's End-date formula:
//   =WORKDAY(<startCell>, <estCell>*100/<workload>, <holidaysRange>)
// Returns { startRef, estRef, workload, holidaysArg } or null if the
// formula doesn't match (in which case recalculation isn't offered).
function parseWorkdayFormula(formula) {
  if (!formula) return null;
  const m = formula.match(/WORKDAY\(\s*([A-Z]+\d+)\s*,\s*([A-Z]+\d+)\s*\*\s*100\s*\/\s*([\d.]+)\s*,\s*(.+)\)\s*$/i);
  if (!m) return null;
  return { startRef: m[1], estRef: m[2], workload: parseFloat(m[3]), holidaysArg: m[4] };
}

function activityKey(activity) {
  return (activity || "Uncategorized").trim() || "Uncategorized";
}

function colorForActivity(activity) {
  const key = activityKey(activity);
  if (!activityColors.has(key)) {
    activityColors.set(key, ACTIVITY_PALETTE[activityColors.size % ACTIVITY_PALETTE.length]);
  }
  return activityColors.get(key);
}

async function loadData() {
  setStatus("Loading sheet…");
  try {
    if (holidaySet.size === 0) await loadHolidays();
    const range = `'${CONFIG.SHEET_NAME}'!A2:L3000`;
    // Fetch formulas too (separately) so we know which Start/End cells are
    // formula-driven (e.g. "=H4+1" for a dependent Start) and never
    // overwrite those with a literal value — see saveField() below.
    const [data, formulaData] = await Promise.all([
      sheetsFetch(`/values/${encodeURIComponent(range)}?majorDimension=ROWS`),
      sheetsFetch(`/values/${encodeURIComponent(range)}?majorDimension=ROWS&valueRenderOption=FORMULA`),
    ]);
    const rows = data.values || [];
    const formulaRows = formulaData.values || [];
    const C = CONFIG.COL;
    const MIN_SANE_YEAR = 2015; // dates before this are blank/formula cells rendered as the Sheets epoch (1899/1900)
    tasks = [];
    activityColors = new Map();
    let skippedSentinel = 0;
    rows.forEach((row, i) => {
      const assignee = (row[C.ASSIGNEE] || "").trim();
      const start = parseDate(row[C.START]);
      const end = parseDate(row[C.END]);
      if (!assignee || !start || !end) return; // skip blank/header/incomplete rows
      if (start.getFullYear() < MIN_SANE_YEAR || end.getFullYear() < MIN_SANE_YEAR) { skippedSentinel++; return; }
      const activity = (row[C.ACTIVITY] || "").trim();
      const fRow = formulaRows[i] || [];
      const startFormulaRaw = typeof fRow[C.START] === "string" ? fRow[C.START].trim() : "";
      const endFormulaRaw = typeof fRow[C.END] === "string" ? fRow[C.END].trim() : "";
      const startIsFormula = startFormulaRaw.startsWith("=");
      const endIsFormula = endFormulaRaw.startsWith("=");
      const estRaw = row[C.EST] || "";
      const estNum = parseFloat(estRaw);
      tasks.push({
        rowNum: i + 2, // actual sheet row (1-based, +1 for header)
        assignee,
        department: row[C.DEPT] || "",
        jira: row[C.JIRA] || "",
        feature: row[C.FEATURE] || "",
        taskName: row[C.TASKS] || "",
        activity,
        start, end,
        est: estRaw,
        estNum: isNaN(estNum) ? null : estNum,
        status: row[C.STATUS] || "",
        label: (row[C.FEATURE] || row[C.TASKS] || row[C.ACTIVITY] || "Task"),
        color: colorForActivity(activity),
        startIsFormula,
        endIsFormula,
        startFormulaRaw,
        endFormulaRaw,
      });
    });

    if (selectedAssignees === null) {
      // First load this session: restore the saved selection if we have one,
      // otherwise default to everyone selected.
      selectedAssignees = uiState.assignees ? new Set(uiState.assignees) : new Set(tasks.map(t => t.assignee));
    } else {
      // keep previous selection, but add any brand-new assignees as selected
      const allNames = new Set(tasks.map(t => t.assignee));
      allNames.forEach(n => { if (!selectedAssignees.has(n) && !everSeenAssignees.has(n)) selectedAssignees.add(n); });
    }
    everSeenAssignees = new Set(tasks.map(t => t.assignee));

    if (selectedActivities === null) {
      selectedActivities = uiState.activities ? new Set(uiState.activities) : new Set(tasks.map(t => activityKey(t.activity)));
    } else {
      const allActivities = new Set(tasks.map(t => activityKey(t.activity)));
      allActivities.forEach(a => { if (!selectedActivities.has(a) && !everSeenActivities.has(a)) selectedActivities.add(a); });
    }
    everSeenActivities = new Set(tasks.map(t => activityKey(t.activity)));

    buildAssigneePanel();
    buildActivityPanel();
    buildLegend();
    buildLanes();
    render();
    requestAnimationFrame(() => jumpToToday(true)); // land on Today by default, no click needed
    setStatus(`Loaded ${tasks.length} tasks${skippedSentinel ? ` · ${skippedSentinel} skipped (blank date cells)` : ""} · ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus("Load failed: " + err.message, true);
  }
}
let everSeenAssignees = new Set();
let everSeenActivities = new Set();

/* ============================================================
   Lanes — one row per task, in priority order (manual drag order, else
   earliest Start first). Reverted from overlap-based compact packing,
   which had a bug causing tasks to crowd/overlap onto the same row.
   ============================================================ */
function buildLanes() {
  const byAssignee = new Map();
  tasks.forEach((t, idx) => {
    if (!selectedAssignees.has(t.assignee)) return;
    if (!selectedActivities.has(activityKey(t.activity))) return;
    if (!byAssignee.has(t.assignee)) byAssignee.set(t.assignee, []);
    byAssignee.get(t.assignee).push(idx);
  });

  lanes = [];
  for (const [name, idxs] of byAssignee.entries()) {
    const savedOrder = manualOrder[name];
    if (savedOrder && savedOrder.length) {
      const pos = new Map(savedOrder.map((rowNum, i) => [rowNum, i]));
      idxs.sort((a, b) => {
        const oa = pos.has(tasks[a].rowNum) ? pos.get(tasks[a].rowNum) : Infinity;
        const ob = pos.has(tasks[b].rowNum) ? pos.get(tasks[b].rowNum) : Infinity;
        return oa !== ob ? oa - ob : tasks[a].start - tasks[b].start;
      });
    } else {
      idxs.sort((a, b) => tasks[a].start - tasks[b].start);
    }
    idxs.forEach((idx, r) => { tasks[idx].subRow = r; });
    lanes.push({ name, idxs, subRowCount: idxs.length });
  }
  lanes.sort((a, b) => a.name.localeCompare(b.name));

  if (!tasks.length) return;
  const visibleTasks = lanes.flatMap(l => l.idxs).map(i => tasks[i]);
  if (!visibleTasks.length) { minDate = new Date(); maxDate = new Date(); maxDate.setDate(maxDate.getDate() + 30); buildWorkdayIndex(); return; }
  minDate = new Date(Math.min(...visibleTasks.map(t => t.start.getTime())));
  maxDate = new Date(Math.max(...visibleTasks.map(t => t.end.getTime())));
  minDate.setDate(minDate.getDate() - 7);
  maxDate.setDate(maxDate.getDate() + 14);
  buildWorkdayIndex();
}

// Weekends (and holidays) are compressed out of the grid entirely — Friday
// is immediately followed by Monday with no gap — since an empty weekend
// column reads as visual noise rather than useful information here.
function buildWorkdayIndex() {
  workdayList = [];
  workdayIndexMap = new Map();
  const d = new Date(minDate);
  while (d <= maxDate) {
    if (isWorkingDay(d)) {
      workdayIndexMap.set(dateKey(d), workdayList.length);
      workdayList.push(new Date(d));
    }
    d.setDate(d.getDate() + 1);
  }
}

// Returns the column index for a date. Start/End dates are always snapped
// to working days already, so the exact lookup hits; the nearest-neighbor
// fallback only matters for display-only dates like "today" landing on a
// weekend/holiday.
function dayOffset(d) {
  const key = dateKey(d);
  if (workdayIndexMap.has(key)) return workdayIndexMap.get(key);
  let before = new Date(d), after = new Date(d);
  for (let i = 0; i < 14; i++) {
    before.setDate(before.getDate() - 1);
    if (workdayIndexMap.has(dateKey(before))) return workdayIndexMap.get(dateKey(before));
    after.setDate(after.getDate() + 1);
    if (workdayIndexMap.has(dateKey(after))) return workdayIndexMap.get(dateKey(after));
  }
  return 0;
}

/* ============================================================
   Render
   ============================================================ */
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!lanes.length) {
    grid.style.width = "100%"; grid.style.height = "200px";
    grid.innerHTML = `<div style="padding:20px;">No tasks match the current filters.
      <button id="btn-empty-show-all" style="margin-left:8px;">Show all</button></div>`;
    document.getElementById("btn-empty-show-all").addEventListener("click", () => {
      selectedAssignees = new Set(tasks.map(t => t.assignee));
      selectedActivities = new Set(tasks.map(t => activityKey(t.activity)));
      persistAssigneeSelection();
      persistActivitySelection();
      buildAssigneePanel(); buildActivityPanel(); buildLanes(); render();
    });
    return;
  }

  const totalDays = workdayList.length;
  const gridWidth = totalDays * pxPerDay;
  const fullWidth = LABEL_W + gridWidth;

  grid.style.width = fullWidth + "px";

  // Month header
  const monthHeader = document.createElement("div");
  monthHeader.id = "month-header";
  monthHeader.style.width = fullWidth + "px";
  const monthCorner = document.createElement("div");
  monthCorner.className = "corner";
  monthHeader.appendChild(monthCorner);
  let cursor = new Date(minDate);
  cursor.setDate(1);
  while (cursor <= maxDate) {
    const next = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    const segStart = cursor < minDate ? minDate : cursor;
    const segEnd = next < maxDate ? next : new Date(maxDate.getTime() + DAY_MS);
    const left = LABEL_W + dayOffset(segStart) * pxPerDay;
    const width = Math.max(1, (dayOffset(segEnd) - dayOffset(segStart)) * pxPerDay);
    const cell = document.createElement("div");
    cell.className = "month-cell";
    cell.style.left = left + "px";
    cell.style.width = width + "px";
    cell.textContent = cursor.toLocaleDateString(undefined, { month: "short", year: "numeric" });
    monthHeader.appendChild(cell);
    cursor = next;
  }
  grid.appendChild(monthHeader);

  // Day header
  const dayHeader = document.createElement("div");
  dayHeader.id = "day-header";
  dayHeader.style.width = fullWidth + "px";
  const dayCorner = document.createElement("div");
  dayCorner.className = "corner corner-day";
  dayHeader.appendChild(dayCorner);
  workdayList.forEach((date, d) => {
    const cell = document.createElement("div");
    const isMonday = date.getDay() === 1;
    cell.className = "day-cell" + (isMonday ? " week-start" : "");
    cell.style.left = (LABEL_W + d * pxPerDay) + "px";
    cell.style.width = pxPerDay + "px";
    if (pxPerDay >= 20) cell.textContent = date.getDate();
    dayHeader.appendChild(cell);
  });
  grid.appendChild(dayHeader);

  // Body
  const body = document.createElement("div");
  body.id = "body-row";
  body.style.width = fullWidth + "px";

  let y = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayX = LABEL_W + dayOffset(today) * pxPerDay;

  laneScrollRanges = [];
  lanes.forEach((lane) => {
    const laneHeight = lane.subRowCount * ROW_H;
    laneScrollRanges.push({ name: lane.name, yStart: y });

    const bg = document.createElement("div");
    bg.className = "lane-bg";
    bg.style.top = y + "px";
    bg.style.height = laneHeight + "px";
    body.appendChild(bg);

    const labelWrap = document.createElement("div");
    labelWrap.className = "lane-label-wrap";
    labelWrap.style.top = y + "px";
    labelWrap.style.height = laneHeight + "px";
    labelWrap.innerHTML = `<div class="lane-label">${escapeHtml(lane.name)}<small>${lane.idxs.length} task${lane.idxs.length !== 1 ? "s" : ""}</small></div>`;
    body.appendChild(labelWrap);

    lane.idxs.forEach((idx) => {
      const t = tasks[idx];
      const left = LABEL_W + dayOffset(t.start) * pxPerDay;
      const width = Math.max(pxPerDay * 0.6, (dayOffset(t.end) - dayOffset(t.start) + 1) * pxPerDay - 2);
      const top = y + t.subRow * ROW_H + 4;
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.background = t.color;
      bar.style.left = left + "px";
      bar.style.top = top + "px";
      bar.style.width = width + "px";
      bar.dataset.idx = idx;

      // Full text is always Feature/Improvement/Support + Activity — never
      // truncated. It always sits anchored at the bar's real start date;
      // if it's longer than the bar, it simply spills past the colored
      // area onto the plain background (readable via the white text halo)
      // rather than being clipped or bumped to a floating label.
      const fullText = t.activity ? `${t.label} • ${t.activity}` : t.label;
      bar.title = fullText;
      bar.innerHTML = `<span class="bar-text">${escapeHtml(fullText)}</span>
        <div class="handle left"></div><div class="handle right"></div>`;

      attachDrag(bar, t, null, lane, idx, top);
      attachTooltip(bar, t);
      body.appendChild(bar);
    });

    y += laneHeight;
  });

  const totalHeight = y;

  // Weekends no longer create a visual gap, so mark each Monday with a
  // faint full-height guide line to keep weeks easy to tell apart.
  workdayList.forEach((date, d) => {
    if (date.getDay() !== 1) return;
    const line = document.createElement("div");
    line.className = "week-line";
    line.style.left = (LABEL_W + d * pxPerDay) + "px";
    line.style.height = totalHeight + "px";
    body.appendChild(line);
  });

  if (todayX >= LABEL_W) {
    const line = document.createElement("div");
    line.className = "today-line";
    line.style.left = todayX + "px";
    line.style.height = totalHeight + "px";
    body.appendChild(line);
  }

  body.style.height = totalHeight + "px";
  grid.appendChild(body);
  grid.style.height = (56 + totalHeight) + "px";
  updateAssigneeBanner();
  updateScrollbars();
}

// Mobile: the top banner tracks whichever assignee's lane is currently
// scrolled to the top of the timeline, replacing the frozen left column.
function updateAssigneeBanner() {
  const banner = document.getElementById("current-assignee-banner");
  if (!banner || !laneScrollRanges.length) return;
  const wrap = document.getElementById("timeline-wrap");
  const target = wrap.scrollTop + 8; // small lookahead so it flips right as a lane reaches the top
  let current = laneScrollRanges[0].name;
  for (const r of laneScrollRanges) {
    if (r.yStart <= target) current = r.name; else break;
  }
  banner.textContent = "👤 " + current;
}

// Custom scroll-position indicators for mobile (iOS Safari doesn't render
// styled — or reliably even default — scrollbars on a custom-scrolled div).
function updateScrollbars() {
  if (!document.body.classList.contains("mobile-mode")) return;
  const wrap = document.getElementById("timeline-wrap");
  const hTrack = document.getElementById("mobile-hscroll");
  const hThumb = document.getElementById("mobile-hscroll-thumb");
  const vTrack = document.getElementById("mobile-vscroll");
  const vThumb = document.getElementById("mobile-vscroll-thumb");

  const scrollableX = wrap.scrollWidth > wrap.clientWidth;
  hTrack.style.visibility = scrollableX ? "visible" : "hidden";
  if (scrollableX) {
    const trackW = hTrack.clientWidth;
    const thumbW = Math.max(30, trackW * (wrap.clientWidth / wrap.scrollWidth));
    const maxThumbLeft = trackW - thumbW;
    const scrollRatio = wrap.scrollLeft / (wrap.scrollWidth - wrap.clientWidth);
    hThumb.style.width = thumbW + "px";
    hThumb.style.left = (maxThumbLeft * scrollRatio) + "px";
  }

  const scrollableY = wrap.scrollHeight > wrap.clientHeight;
  vTrack.style.visibility = scrollableY ? "visible" : "hidden";
  if (scrollableY) {
    const trackH = vTrack.clientHeight;
    const thumbH = Math.max(30, trackH * (wrap.clientHeight / wrap.scrollHeight));
    const maxThumbTop = trackH - thumbH;
    const scrollRatio = wrap.scrollTop / (wrap.scrollHeight - wrap.clientHeight);
    vThumb.style.height = thumbH + "px";
    vThumb.style.top = (maxThumbTop * scrollRatio) + "px";
  }
}

document.getElementById("timeline-wrap").addEventListener("scroll", () => {
  updateAssigneeBanner();
  updateScrollbars();
}, { passive: true });
window.addEventListener("resize", updateScrollbars);

const _measureCanvas = document.createElement("canvas");
const _measureCtx = _measureCanvas.getContext("2d");
_measureCtx.font = "11.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif";
function measureTextWidth(text) {
  return _measureCtx.measureText(text).width;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ============================================================
   Tooltip
   ============================================================ */
function attachTooltip(bar, t) {
  const tip = document.getElementById("tooltip");
  bar.addEventListener("mouseenter", (e) => {
    tip.innerHTML = `<b>${escapeHtml(t.feature || t.taskName || t.activity)}</b><br>
      ${t.jira ? "JIRA: " + escapeHtml(t.jira) + "<br>" : ""}
      ${t.activity ? "Activity: " + escapeHtml(t.activity) + "<br>" : ""}
      Assignee: ${escapeHtml(t.assignee)}<br>
      ${fmtDate(t.start)} → ${fmtDate(t.end)}<br>
      ${t.status ? "Status: " + escapeHtml(t.status) : ""}`;
    tip.style.display = "block";
  });
  bar.addEventListener("mousemove", (e) => {
    tip.style.left = (e.clientX + 14) + "px";
    tip.style.top = (e.clientY + 14) + "px";
  });
  bar.addEventListener("mouseleave", () => { tip.style.display = "none"; });
}

/* ============================================================
   Drag & resize
   ============================================================ */
function attachDrag(bar, t, extLabel, lane, idx, origTop) {
  let mode = null; // 'move' | 'left' | 'right'
  let startX = 0, startY = 0;
  let origStart, origEnd, origStartIdx, origEndIdx, origWorkDays;
  let deltaRows = 0;
  let origOrderPos = 0; // this task's position within lane.idxs (priority order), captured at drag start
  let preDragSnapshot = null;
  let lastClientX = 0, lastClientY = 0;

  const onMouseDown = (e) => {
    if (e.target.classList.contains("handle")) {
      mode = e.target.classList.contains("left") ? "left" : "right";
    } else {
      mode = "move";
    }
    startX = e.clientX;
    startY = e.clientY;
    origStart = new Date(t.start);
    origEnd = new Date(t.end);
    origStartIdx = dayOffset(origStart);
    origEndIdx = dayOffset(origEnd);
    origWorkDays = origEndIdx - origStartIdx + 1;
    origOrderPos = lane ? lane.idxs.indexOf(idx) : 0;
    deltaRows = 0;
    lastClientX = e.clientX; lastClientY = e.clientY;
    preDragSnapshot = snapshotState();
    bar.classList.add("dragging");
    if (mode === "move") bar.style.zIndex = 40;
    document.getElementById("tooltip").style.display = "none";
    bar.setPointerCapture(e.pointerId); // keep receiving move events even if a finger slides off the bar
    e.preventDefault();
    e.stopPropagation(); // don't also trigger canvas panning
  };
  bar.addEventListener("pointerdown", onMouseDown);
  if (extLabel) extLabel.addEventListener("pointerdown", onMouseDown); // label-only drag = move

  bar.addEventListener("pointermove", (e) => {
    if (!mode) return;
    lastClientX = e.clientX; lastClientY = e.clientY;
    const deltaPx = e.clientX - startX;
    // Since weekends/holidays are compressed out of the grid, each pixel
    // column IS a working day — so the drag delta maps directly to an
    // index step in workdayList, never landing on a non-working day.
    const deltaCols = Math.round(deltaPx / pxPerDay);
    const lastIdx = workdayList.length - 1;
    let newStart = origStart, newEnd = origEnd;
    if (mode === "move") {
      const newStartIdx = Math.max(0, Math.min(lastIdx, origStartIdx + deltaCols));
      newStart = workdayList[newStartIdx];
      newEnd = workdayList[Math.max(0, Math.min(lastIdx, newStartIdx + origWorkDays - 1))];
    } else if (mode === "left") {
      const newStartIdx = Math.max(0, Math.min(origEndIdx, origStartIdx + deltaCols));
      newStart = workdayList[newStartIdx];
    } else if (mode === "right") {
      const newEndIdx = Math.max(origStartIdx, Math.min(lastIdx, origEndIdx + deltaCols));
      newEnd = workdayList[newEndIdx];
    }
    t.start = new Date(newStart); t.end = new Date(newEnd);
    const left = LABEL_W + dayOffset(t.start) * pxPerDay;
    const width = Math.max(pxPerDay * 0.6, (dayOffset(t.end) - dayOffset(t.start) + 1) * pxPerDay - 2);
    bar.style.left = left + "px";
    bar.style.width = width + "px";
    if (extLabel) extLabel.style.left = (left + width + 5) + "px";

    // Vertical drag (whole-bar move only) = reorder priority within the lane.
    if (mode === "move" && lane) {
      const deltaY = e.clientY - startY;
      // Bounds are the priority-order position, not the (now dynamic,
      // overlap-packed) visual row — final row is recomputed on drop.
      deltaRows = Math.max(-origOrderPos, Math.min(lane.idxs.length - 1 - origOrderPos, Math.round(deltaY / ROW_H)));
      const newTop = origTop + deltaRows * ROW_H;
      bar.style.top = newTop + "px";
      if (extLabel) extLabel.style.top = newTop + "px";
    }
  });

  bar.addEventListener("pointerup", async () => {
    if (!mode) return;
    bar.classList.remove("dragging");
    bar.style.zIndex = "";

    // A plain click (negligible movement) on the bar body opens the
    // estimate/workload recalculation dialog instead of being treated as a drag.
    const totalMove = Math.hypot(lastClientX - startX, lastClientY - startY);
    if (mode === "move" && totalMove < 4) {
      mode = null;
      t.start = new Date(origStart); t.end = new Date(origEnd); // discard any sub-pixel jitter
      render();
      openTaskModal(t);
      return;
    }

    const wasMove = mode === "move";
    const wasRight = mode === "right";
    const changed = t.start.getTime() !== origStart.getTime() || t.end.getTime() !== origEnd.getTime();
    const endChanged = t.end.getTime() !== origEnd.getTime();
    mode = null;

    // Vertical drag (whole-bar move only) = reorder priority within the lane.
    let chainFormulaFixed = [];
    if (wasMove && lane && deltaRows !== 0) {
      const srcPos = lane.idxs.indexOf(idx);
      const destPos = Math.max(0, Math.min(lane.idxs.length - 1, srcPos + deltaRows));
      if (destPos !== srcPos) {
        lane.idxs.splice(srcPos, 1);
        lane.idxs.splice(destPos, 0, idx);
        lane.idxs.forEach((ix, r) => { tasks[ix].subRow = r; });
        manualOrder[lane.name] = lane.idxs.map(ix => tasks[ix].rowNum);
        localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(manualOrder));

        // Reordering can leave a Start formula (=WORKDAY(H<prevRow>,1,...))
        // pointing at a task that's no longer immediately before it —
        // that mismatch is exactly what caused the row-packing confusion
        // last time. Offer to re-point those formulas at the new
        // predecessor and cascade the resulting date shift.
        const fixups = findChainFormulaMismatches(lane);
        if (fixups.length) {
          const ok = window.confirm(
            `Reordering left ${fixups.length} Start-date formula${fixups.length > 1 ? "s" : ""} pointing at the wrong "previous task" (they still reference where this task used to sit).\n\nUpdate ${fixups.length > 1 ? "them" : "it"} to reference the new previous task, and shift the resulting dates?`
          );
          if (ok) {
            for (const fx of fixups) {
              const depOrigStart = new Date(fx.t.start), depOrigEnd = new Date(fx.t.end);
              const newFormula = `=WORKDAY(H${fx.newPrevTask.rowNum},1,Holidays!$B$2:$B)`;
              await writeFormula(fx.t, "start", newFormula);
              fx.t.start = excelWorkday(fx.newPrevTask.end, 1);
              if (fx.t.endIsFormula) {
                const parsedEnd = parseWorkdayFormula(fx.t.endFormulaRaw);
                if (parsedEnd) fx.t.end = excelWorkday(fx.t.start, (fx.t.estNum || 0) * 100 / parsedEnd.workload);
              }
              chainFormulaFixed.push({ t: fx.t, origStart: depOrigStart, origEnd: depOrigEnd });
            }
          }
        }
      }
    }

    // This task's End date moved — offer to shift any downstream task in the
    // same lane whose Start date was chained to this task's (old) End date.
    let chainShifted = [];
    if ((wasMove || wasRight) && endChanged && lane) {
      const chain = findDependencyChain(t, lane, origEnd);
      if (chain.length) {
        const shiftCols = dayOffset(t.end) - origEndIdx; // workday columns, not calendar days
        const verb = shiftCols > 0 ? "later" : "earlier";
        const ok = window.confirm(
          `${Math.abs(shiftCols)} workday(s) ${verb}. This task has ${chain.length} downstream task${chain.length > 1 ? "s" : ""} chained to start right after it ends.\n\nShift ${chain.length > 1 ? "them" : "it"} by the same amount to keep the dependency intact?`
        );
        if (ok) {
          const lastIdx = workdayList.length - 1;
          chain.forEach((dep) => {
            const depOrigStart = new Date(dep.start), depOrigEnd = new Date(dep.end);
            const depStartIdx = dayOffset(dep.start);
            const depWorkDays = dayOffset(dep.end) - depStartIdx + 1;
            const newDepStartIdx = Math.max(0, Math.min(lastIdx, depStartIdx + shiftCols));
            dep.start = new Date(workdayList[newDepStartIdx]);
            dep.end = new Date(workdayList[Math.max(0, Math.min(lastIdx, newDepStartIdx + depWorkDays - 1))]);
            chainShifted.push({ t: dep, origStart: depOrigStart, origEnd: depOrigEnd });
          });
        }
      }
    }

    const reordered = wasMove && lane && deltaRows !== 0;
    if (changed || reordered || chainShifted.length || chainFormulaFixed.length) {
      commitUndoPoint(preDragSnapshot);
    }

    render();
    // Only write the field the user actually dragged — 'move'/'left' drag
    // the Start handle, 'right' drags the End handle. The other field is
    // left untouched so any formula in it (e.g. End = Start + duration)
    // keeps cascading inside the sheet instead of being overwritten.
    if (changed) {
      const directField = wasRight ? "end" : "start";
      await saveChangedFields(t, origStart, origEnd, directField);
    }
    // Downstream chained tasks were never directly touched by the user —
    // only write fields that are NOT formula-driven; formula fields cascade
    // on their own once the field(s) above land in the sheet.
    for (const { t: dep, origStart: dOrigStart, origEnd: dOrigEnd } of chainShifted) {
      await saveChangedFields(dep, dOrigStart, dOrigEnd);
    }
  });

  bar.addEventListener("pointercancel", () => {
    if (!mode) return;
    mode = null;
    bar.classList.remove("dragging");
    bar.style.zIndex = "";
    t.start = new Date(origStart); t.end = new Date(origEnd);
    render();
  });
}

// Same-lane finish-to-start chain: dep.start === anchorTask's end + 1 day,
// followed transitively (dep2 chained to dep1's original end, etc).
function findDependencyChain(anchorTask, lane, anchorOrigEnd) {
  const chain = [];
  const used = new Set([anchorTask]);
  let cursorEnd = anchorOrigEnd;
  const candidates = lane.idxs.map((ix) => tasks[ix]).filter((x) => x !== anchorTask);
  let found = true;
  while (found) {
    found = false;
    for (const cand of candidates) {
      if (used.has(cand)) continue;
      if (dayOffset(cand.start) === dayOffset(cursorEnd) + 1) {
        chain.push(cand);
        used.add(cand);
        cursorEnd = cand.end;
        found = true;
        break;
      }
    }
  }
  return chain;
}

// Scans a lane (in its CURRENT priority order) for tasks whose Start
// formula is a "=WORKDAY(H<row>,1,...)" chain reference that no longer
// points at the task now immediately before it — i.e. the formula and the
// on-screen order have drifted apart, usually from drag-reordering after
// the formula was written. Returns [{ t, oldPrevRow, newPrevTask }, ...].
function findChainFormulaMismatches(lane) {
  const fixups = [];
  lane.idxs.forEach((idx, i) => {
    const t = tasks[idx];
    if (!t.startIsFormula) return;
    const m = (t.startFormulaRaw || "").match(/WORKDAY\(\s*H(\d+)/i);
    if (!m) return; // not our chain-formula pattern — leave it alone
    const referencedRow = parseInt(m[1], 10);
    if (i === 0) return; // no predecessor to compare against
    const newPrevTask = tasks[lane.idxs[i - 1]];
    if (referencedRow !== newPrevTask.rowNum) {
      fixups.push({ t, oldPrevRow: referencedRow, newPrevTask });
    }
  });
  return fixups;
}

// Writes exactly one column (Start=G or End=H) for one task, and marks that
// cell as no longer a formula (since we just replaced it with a literal
// date) — the OTHER column is never touched by this call, so a formula
// there (e.g. an End that computes itself from Start, or a downstream
// Start that references the previous task's End) is preserved and keeps
// cascading on its own inside the sheet.
async function saveField(t, field) {
  const col = field === "start" ? "G" : "H";
  const value = field === "start" ? fmtDate(t.start) : fmtDate(t.end);
  setStatus(`Saving row ${t.rowNum} (${field})…`, false, true);
  try {
    const range = `'${CONFIG.SHEET_NAME}'!${col}${t.rowNum}`;
    await sheetsFetch(`/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, {
      method: "PUT",
      body: JSON.stringify({ range, majorDimension: "ROWS", values: [[value]] }),
    });
    if (field === "start") t.startIsFormula = false; else t.endIsFormula = false;
    setStatus(`Saved row ${t.rowNum} ${field}: ${value} · ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus("Save failed — reload to resync: " + err.message, true);
  }
}

// Writes whichever of Start/End actually changed, skipping any field that's
// formula-driven (unless `force` names it explicitly — used for the field
// the user directly dragged, which is always OK to overwrite).
async function saveChangedFields(t, origStart, origEnd, force) {
  const startChanged = t.start.getTime() !== origStart.getTime();
  const endChanged = t.end.getTime() !== origEnd.getTime();
  if (startChanged && (force === "start" || !t.startIsFormula)) await saveField(t, "start");
  if (endChanged && (force === "end" || !t.endIsFormula)) await saveField(t, "end");
}

// Writes a formula string (must start with "=") to one cell and marks the
// field as formula-driven — used by the recalculate modal and the bulk
// FRD/Spec formula action below, so both stay real formulas going forward.
async function writeFormula(t, field, formula) {
  const col = field === "start" ? "G" : "H";
  const range = `'${CONFIG.SHEET_NAME}'!${col}${t.rowNum}`;
  await sheetsFetch(`/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, {
    method: "PUT",
    body: JSON.stringify({ range, majorDimension: "ROWS", values: [[formula]] }),
  });
  if (field === "start") { t.startFormulaRaw = formula; t.startIsFormula = true; }
  else { t.endFormulaRaw = formula; t.endIsFormula = true; }
}

// Same ordering rule as buildLanes (manual drag-order if set, else by Start
// date) but across ALL tasks regardless of the current assignee/activity
// filter — used so "previous task" means the same thing here as it does
// visually in the timeline.
function orderedTasksByAssignee() {
  const byAssignee = new Map();
  tasks.forEach((t) => {
    if (!byAssignee.has(t.assignee)) byAssignee.set(t.assignee, []);
    byAssignee.get(t.assignee).push(t);
  });
  for (const [name, list] of byAssignee.entries()) {
    const savedOrder = manualOrder[name];
    if (savedOrder && savedOrder.length) {
      const pos = new Map(savedOrder.map((rowNum, i) => [rowNum, i]));
      list.sort((a, b) => {
        const oa = pos.has(a.rowNum) ? pos.get(a.rowNum) : Infinity;
        const ob = pos.has(b.rowNum) ? pos.get(b.rowNum) : Infinity;
        return oa !== ob ? oa - ob : a.start - b.start;
      });
    } else {
      list.sort((a, b) => a.start - b.start);
    }
  }
  return byAssignee;
}

const FRD_SPEC_ACTIVITIES = new Set(["frd creation", "spec creation"]);
const FRD_SPEC_WORKLOAD = 30; // default workload % for these two activities

async function applyFrdSpecFormulas() {
  const byAssignee = orderedTasksByAssignee();
  const jobs = []; // { t, startFormula (nullable), endFormula }

  for (const list of byAssignee.values()) {
    list.forEach((t, i) => {
      if (!FRD_SPEC_ACTIVITIES.has(activityKey(t.activity).toLowerCase())) return;
      const prev = i > 0 ? list[i - 1] : null;
      const startFormula = prev ? `=WORKDAY(H${prev.rowNum},1,Holidays!$B$2:$B)` : null;
      const endFormula = `=WORKDAY(G${t.rowNum},I${t.rowNum}*100/${FRD_SPEC_WORKLOAD},Holidays!$B$2:$B)`;
      jobs.push({ t, prev, startFormula, endFormula });
    });
  }

  if (!jobs.length) {
    setStatus("No FRD Creation / Spec Creation tasks found.", true);
    return;
  }

  const skippedNoPrev = jobs.filter(j => !j.startFormula).length;
  const ok = window.confirm(
    `Apply Start/End formulas to ${jobs.length} FRD Creation / Spec Creation task(s)?\n\n` +
    `Start = WORKDAY(previous task's End, 1, Holidays)\n` +
    `End = WORKDAY(Start, Estimate*100/${FRD_SPEC_WORKLOAD}, Holidays)\n\n` +
    (skippedNoPrev ? `${skippedNoPrev} of them is/are first in their lane (no previous task) — only their End formula will be applied.` : "")
  );
  if (!ok) return;

  commitUndoPoint(snapshotState());
  setStatus(`Applying formulas to ${jobs.length} task(s)…`, false, true);
  try {
    for (const job of jobs) {
      const { t, prev, startFormula, endFormula } = job;
      if (startFormula) {
        await writeFormula(t, "start", startFormula);
        t.start = excelWorkday(prev.end, 1);
      }
      await writeFormula(t, "end", endFormula);
      t.end = excelWorkday(t.start, (t.estNum || 0) * 100 / FRD_SPEC_WORKLOAD);
    }
    buildLanes();
    render();
    setStatus(`Applied formulas to ${jobs.length} task(s) · ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus("Apply failed partway — reload to check current state: " + err.message, true);
  }
}

document.getElementById("btn-apply-frd-spec").addEventListener("click", applyFrdSpecFormulas);

// Resets every lane's row order back to chronological (Start date) order —
// clears the manual drag-order override that had drifted out of sync with
// the actual dates/formulas and was causing the scattered layout.
document.getElementById("btn-align-waterfall").addEventListener("click", () => {
  const laneCount = Object.keys(manualOrder).length;
  if (!laneCount) { setStatus("Already in chronological order — nothing to reset."); return; }
  const ok = window.confirm(
    `This clears the manual row-priority order for ${laneCount} lane(s) and resets every lane to chronological (Start date) order.\n\nThis does not change any dates — only which row each task displays on. Continue?`
  );
  if (!ok) return;
  commitUndoPoint(snapshotState());
  manualOrder = {};
  localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(manualOrder));
  buildLanes();
  render();
  setStatus(`Row order reset to chronological · ${new Date().toLocaleTimeString()}`);
});

/* ============================================================
   Task detail / recalculate modal — click a bar (without dragging) to
   open it. Shows current Estimate + Workload (parsed from the End
   formula, e.g. =WORKDAY(G538,I538*100/30,Holidays!$B$2:$B)) and lets
   you edit either, previewing the recalculated End date before applying.
   ============================================================ */
let modalTask = null;

function openTaskModal(t) {
  modalTask = t;
  const parsed = parseWorkdayFormula(t.endFormulaRaw);

  document.getElementById("tm-title").textContent = t.label;
  document.getElementById("tm-sub").textContent = `${t.assignee}${t.activity ? " • " + t.activity : ""}`;
  document.getElementById("tm-start").textContent = fmtDate(t.start);
  document.getElementById("tm-end").textContent = fmtDate(t.end);
  document.getElementById("tm-formula").textContent = t.endFormulaRaw || "(none — plain date)";
  document.getElementById("tm-preview").style.display = "none";

  const estInput = document.getElementById("tm-est");
  const workloadInput = document.getElementById("tm-workload");
  const warn = document.getElementById("tm-warn");
  const recalcBtn = document.getElementById("tm-recalc");
  const applyBtn = document.getElementById("tm-apply");

  estInput.value = t.estNum !== null ? t.estNum : "";
  applyBtn.style.display = "none";

  if (parsed) {
    warn.style.display = "none";
    workloadInput.value = parsed.workload;
    workloadInput.disabled = false;
    recalcBtn.disabled = false;
  } else {
    warn.style.display = "block";
    warn.textContent = "This task's End date doesn't use the standard WORKDAY(Start, Estimate*100/Workload, Holidays) formula, so recalculation isn't available here — edit it directly in the sheet.";
    workloadInput.value = "";
    workloadInput.disabled = true;
    recalcBtn.disabled = true;
  }

  document.getElementById("task-modal-backdrop").classList.add("open");
}

function closeTaskModal() {
  document.getElementById("task-modal-backdrop").classList.remove("open");
  modalTask = null;
}

document.getElementById("tm-cancel").addEventListener("click", closeTaskModal);
document.getElementById("task-modal-backdrop").addEventListener("click", (e) => {
  if (e.target.id === "task-modal-backdrop") closeTaskModal();
});

document.getElementById("tm-recalc").addEventListener("click", () => {
  if (!modalTask) return;
  const t = modalTask;
  const parsed = parseWorkdayFormula(t.endFormulaRaw);
  if (!parsed) return;
  const est = parseFloat(document.getElementById("tm-est").value);
  const workload = parseFloat(document.getElementById("tm-workload").value);
  const preview = document.getElementById("tm-preview");
  if (isNaN(est) || isNaN(workload) || workload <= 0) {
    preview.style.display = "block";
    preview.innerHTML = `Enter a valid estimate and a workload > 0%.`;
    document.getElementById("tm-apply").style.display = "none";
    return;
  }
  const workDaysNeeded = est * 100 / workload;
  const newEnd = excelWorkday(t.start, workDaysNeeded);
  preview.style.display = "block";
  preview.innerHTML = `${Math.trunc(workDaysNeeded)} elapsed workday(s) at ${workload}% workload → new End: <b>${fmtDate(newEnd)}</b> (was ${fmtDate(t.end)})`;
  document.getElementById("tm-apply").style.display = "inline-block";
  document.getElementById("tm-apply").dataset.newEnd = newEnd.getTime();
  document.getElementById("tm-apply").dataset.newEst = est;
  document.getElementById("tm-apply").dataset.newWorkload = workload;
});

document.getElementById("tm-apply").addEventListener("click", async () => {
  if (!modalTask) return;
  const t = modalTask;
  const applyBtn = document.getElementById("tm-apply");
  const newEnd = new Date(parseInt(applyBtn.dataset.newEnd, 10));
  const newEst = parseFloat(applyBtn.dataset.newEst);
  const newWorkload = parseFloat(applyBtn.dataset.newWorkload);
  const parsed = parseWorkdayFormula(t.endFormulaRaw);

  commitUndoPoint(snapshotState());
  const origEnd = new Date(t.end);
  t.end = newEnd;

  setStatus(`Saving row ${t.rowNum} (estimate/workload)…`, false, true);
  try {
    // Estimate is a plain value cell — write it if changed.
    if (t.estNum !== newEst) {
      await sheetsFetch(`/values/${encodeURIComponent(`'${CONFIG.SHEET_NAME}'!I${t.rowNum}`)}?valueInputOption=USER_ENTERED`, {
        method: "PUT",
        body: JSON.stringify({ range: `'${CONFIG.SHEET_NAME}'!I${t.rowNum}`, majorDimension: "ROWS", values: [[String(newEst)]] }),
      });
      t.est = String(newEst);
      t.estNum = newEst;
    }
    // Rewrite the End formula with the new workload constant — stays a
    // real formula (still starts with "="), so it keeps recalculating
    // itself (and cascading to any dependent Start) going forward.
    if (parsed && newWorkload !== parsed.workload) {
      const newFormula = `=WORKDAY(${parsed.startRef},${parsed.estRef}*100/${newWorkload},${parsed.holidaysArg})`;
      await sheetsFetch(`/values/${encodeURIComponent(`'${CONFIG.SHEET_NAME}'!H${t.rowNum}`)}?valueInputOption=USER_ENTERED`, {
        method: "PUT",
        body: JSON.stringify({ range: `'${CONFIG.SHEET_NAME}'!H${t.rowNum}`, majorDimension: "ROWS", values: [[newFormula]] }),
      });
      t.endFormulaRaw = newFormula;
      t.endIsFormula = true;
    } else if (parsed) {
      // Workload unchanged but Estimate changed — the existing formula
      // will recompute End on its own; nothing to write to H.
    }
    setStatus(`Saved row ${t.rowNum}: End → ${fmtDate(t.end)} · ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setStatus("Save failed — reload to resync: " + err.message, true);
    t.end = origEnd;
  }

  buildLanes();
  render();
  closeTaskModal();
});

/* ============================================================
   Boot
   ============================================================ */
window.addEventListener("load", () => {
  const check = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2) {
      clearInterval(check);
      initAuth();
    }
  }, 100);
});
</script>
